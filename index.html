<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>以太四象｜報價單平台</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
:root{--bg:#0c0d10;--surface:#14161a;--surface2:#1c1f24;--border:#282c34;--accent:#ccb38c;--accent2:#ddc9a6;--text:#e6e3dc;--muted:#888480;--success:#5aab8f;--danger:#c97b7b;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI','PingFang TC','Noto Sans TC',sans-serif;min-height:100vh;}
.app{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:240px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.logo{padding:18px 16px 14px;border-bottom:1px solid var(--border);}
.logo h1{font-size:15px;font-weight:700;color:var(--accent2);letter-spacing:1px;}
.logo p{font-size:11px;color:var(--muted);margin-top:2px;}
.nav-section{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;padding:14px 16px 6px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--muted);transition:all .15s;margin:1px 8px;}
.nav-item:hover{background:var(--surface2);color:var(--text);}
.nav-item.active{background:rgba(204,179,140,.12);color:var(--accent2);font-weight:600;}
.history-list{flex:1;overflow-y:auto;padding:4px 8px 8px;}
.history-item{padding:9px 10px;border-radius:8px;cursor:pointer;margin-bottom:3px;border:1px solid transparent;transition:all .15s;}
.history-item:hover{background:var(--surface2);}
.history-item.active{border-color:var(--accent);background:rgba(204,179,140,.08);}
.history-item .h-qno{font-size:11px;font-weight:600;color:var(--accent2);}
.history-item .h-name{font-size:12px;color:var(--text);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.history-item .h-date{font-size:10px;color:var(--muted);margin-top:1px;}
.sidebar-bottom{padding:12px;border-top:1px solid var(--border);}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{height:54px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 22px;gap:10px;flex-shrink:0;}
.topbar-title{font-size:15px;font-weight:600;flex:1;}
.content{flex:1;overflow-y:auto;padding:24px;}
.btn{padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:5px;}
.btn-primary{background:var(--accent);color:#0c0d10;font-weight:600;}
.btn-primary:hover{background:var(--accent2);}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);}
.btn-ghost:hover{background:var(--surface2);color:var(--text);}
.btn-success{background:var(--success);color:#fff;font-weight:600;}
.btn-success:hover{opacity:.85;}
.btn-danger-ghost{background:transparent;color:var(--danger);border:1px solid var(--border);}
.btn-danger-ghost:hover{background:rgba(201,123,123,.1);}
.btn-sm{padding:5px 11px;font-size:12px;}
.btn-full{width:100%;justify-content:center;}
.tabs{display:flex;gap:3px;background:var(--bg);border-radius:8px;padding:3px;}
.tab{padding:5px 14px;border-radius:6px;cursor:pointer;font-size:12px;color:var(--muted);border:none;background:none;transition:all .15s;}
.tab.active{background:var(--accent);color:#0c0d10;font-weight:600;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-group.full{grid-column:1/-1;}
.form-group label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
.form-group input,.form-group select,.form-group textarea{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:8px 11px;font-size:13px;font-family:inherit;outline:none;transition:border-color .15s;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent);}
.form-group textarea{resize:vertical;min-height:56px;}
.form-group select option{background:var(--surface2);}
.section-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px;margin-bottom:16px;}
.section-card-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.items-table-wrap{overflow-x:auto;}
.items-table{width:100%;border-collapse:collapse;}
.items-table th{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:7px 8px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap;}
.items-table th.r{text-align:right;}
.items-table td{padding:6px 8px;border-bottom:1px solid rgba(40,44,52,.6);vertical-align:middle;}
.item-input{background:var(--surface2);border:1px solid transparent;border-radius:6px;color:var(--text);padding:6px 8px;font-size:13px;font-family:inherit;outline:none;width:100%;transition:border-color .15s;}
.item-input:focus{border-color:var(--accent);}
.item-input.r{text-align:right;}
.items-totals{display:flex;flex-direction:column;align-items:flex-end;gap:4px;padding:10px 8px 0;border-top:1px solid var(--border);margin-top:4px;}
.total-row{display:flex;gap:16px;font-size:12px;}
.total-row .tl{color:var(--muted);min-width:90px;text-align:right;}
.total-row .tv{min-width:80px;text-align:right;font-weight:500;}
.total-row.grand{font-size:14px;font-weight:700;border-top:1px solid var(--border);padding-top:6px;margin-top:2px;}
.total-row.grand .tv{color:var(--accent2);}
.btn-icon{width:28px;height:28px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--danger);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.btn-icon:hover{background:rgba(201,123,123,.1);}
.profit-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 18px;}
.stat-card .s-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.stat-card .s-val{font-size:20px;font-weight:700;}
.stat-card .s-val.green{color:var(--success);}
.stat-card .s-val.gold{color:var(--accent2);}
.stat-card .s-val.red{color:var(--danger);}
.profit-items-table{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.profit-items-table table{width:100%;border-collapse:collapse;}
.profit-items-table th{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:10px 14px;border-bottom:1px solid var(--border);text-align:left;}
.profit-items-table th.r{text-align:right;}
.profit-items-table td{padding:10px 14px;border-bottom:1px solid rgba(40,44,52,.5);font-size:12px;}
.profit-items-table tr:last-child td{border-bottom:none;}
.profit-items-table td.r{text-align:right;}
.margin-badge{display:inline-block;padding:2px 7px;border-radius:12px;font-size:11px;font-weight:600;}
.margin-badge.good{background:rgba(90,171,143,.15);color:var(--success);}
.margin-badge.warn{background:rgba(201,123,123,.15);color:var(--danger);}
.items-library-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
.lib-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;position:relative;transition:border-color .15s;}
.lib-card:hover{border-color:rgba(204,179,140,.4);}
.lib-card .lc-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:10px;padding-right:56px;}
.lib-card .lc-row{display:flex;gap:18px;margin-bottom:6px;}
.lib-card .lc-field{display:flex;flex-direction:column;gap:2px;}
.lib-card .lc-field .lf-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
.lib-card .lc-field .lf-val{font-size:13px;font-weight:500;}
.lib-card .lc-profit{display:flex;align-items:center;gap:8px;margin-top:8px;}
.lib-card .lc-profit .lp-val{font-size:13px;font-weight:600;color:var(--success);}
.lib-card .lc-actions{position:absolute;top:12px;right:12px;display:flex;gap:6px;}
.lib-edit-form{background:var(--surface2);border:1px solid var(--accent);border-radius:12px;padding:16px;margin-bottom:14px;}
.lib-edit-form .lef-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.lib-edit-form .lef-grid.full{grid-template-columns:1fr;}
.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.summary-table{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.summary-table table{width:100%;border-collapse:collapse;}
.summary-table th{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:10px 14px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap;}
.summary-table th.r{text-align:right;}
.summary-table td{padding:10px 14px;border-bottom:1px solid rgba(40,44,52,.5);font-size:12px;}
.summary-table tr:last-child td{border-bottom:none;}
.summary-table td.r{text-align:right;}
.sync-badge{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);background:var(--surface2);padding:4px 10px;border-radius:20px;border:1px solid var(--border);}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);}
.sync-dot.online{background:var(--success);}
.sync-dot.offline{background:var(--danger);}
.toast{position:fixed;bottom:24px;right:24px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;font-size:12px;z-index:9999;opacity:0;transition:opacity .2s;pointer-events:none;max-width:280px;}
.toast.show{opacity:1;}
.toast.success{border-color:var(--success);color:var(--success);}
.toast.error{border-color:var(--danger);color:var(--danger);}
.toast.info{border-color:var(--accent);color:var(--accent2);}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--muted);}
.empty-state .es-icon{font-size:48px;opacity:.3;}
.empty-state p{font-size:13px;}
/* Preview styles */
.preview-wrap{background:#f5f4f0;border-radius:12px;padding:0;overflow:hidden;max-width:800px;margin:0 auto;box-shadow:0 4px 24px rgba(0,0,0,.4);}
#pdf-target{background:#fff;padding:28px 32px;font-family:'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif;color:#1a1a1a;}
.pv-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;padding-bottom:16px;border-bottom:2px solid #1a1a1a;}
.pv-brand{}
.pv-brand img{max-height:52px;max-width:220px;object-fit:contain;display:block;}
.pv-doc-info{text-align:right;}
.pv-doc-info .pv-title{font-size:20px;font-weight:800;letter-spacing:2px;color:#1a1a1a;}
.pv-doc-info .pv-qno{font-size:12px;color:#666;margin-top:4px;}
.pv-doc-info .pv-date{font-size:11px;color:#888;margin-top:2px;}
.pv-meta{display:grid;grid-template-columns:1fr 1fr;gap:0;margin-bottom:16px;border:1px solid #ddd;border-radius:6px;overflow:hidden;}
.pv-meta-block{padding:10px 14px;}
.pv-meta-block:first-child{border-right:1px solid #ddd;}
.pv-meta-label{font-size:10px;font-weight:800;color:#1a1a1a;letter-spacing:.5px;margin-bottom:8px;padding-bottom:6px;border-bottom:1.5px solid #1a1a1a;}
.pv-meta-row{display:flex;gap:6px;margin-bottom:3px;font-size:11px;}
.pv-meta-row .mk{color:#888;min-width:60px;}
.pv-meta-row .mv{color:#1a1a1a;font-weight:500;}
.pv-items{width:100%;border-collapse:collapse;margin-bottom:12px;}
.pv-items th{font-size:9px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;padding:6px 8px;border-bottom:2px solid #1a1a1a;text-align:left;background:#fafafa;}
.pv-items th.r{text-align:right;}
.pv-items td{padding:7px 8px;border-bottom:1px solid #eee;font-size:11px;color:#1a1a1a;vertical-align:top;}
.pv-items td.r{text-align:right;}
.pv-items tr:last-child td{border-bottom:none;}
.pv-totals{display:flex;justify-content:flex-end;margin-bottom:16px;}
.pv-totals-inner{min-width:200px;}
.pv-total-row{display:flex;justify-content:space-between;gap:24px;font-size:11px;padding:3px 0;}
.pv-total-row .pt-label{color:#666;}
.pv-total-row .pt-val{font-weight:500;text-align:right;}
.pv-total-row.grand{font-size:14px;font-weight:800;border-top:2px solid #1a1a1a;padding-top:6px;margin-top:4px;}
.pv-terms{border:1px solid #ddd;border-radius:6px;padding:12px 14px;margin-bottom:16px;background:#fafafa;}
.pv-terms h4{font-size:10px;font-weight:700;color:#1a1a1a;margin-bottom:8px;letter-spacing:.5px;}
.pv-terms ol{padding-left:16px;}
.pv-terms li{font-size:9.5px;color:#444;line-height:1.6;margin-bottom:3px;}
.pv-footer{display:flex;justify-content:space-between;align-items:flex-start;gap:24px;border-top:1px solid #ddd;padding-top:12px;}
.pv-bank{flex:1;display:flex;align-items:flex-start;gap:14px;border:1px solid #ccc;border-radius:4px;padding:10px 14px;min-height:110px;}
.pv-bank-info{}
.pv-bank-label{font-size:9px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.pv-bank-row{font-size:10px;color:#333;margin-bottom:2px;}
.pv-sig{flex:1;max-width:420px;border:1px solid #ccc;border-radius:4px;padding:10px 14px;display:flex;flex-direction:column;justify-content:space-between;min-height:110px;}
.pv-sig-label{font-size:9px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;}
.pv-sig-line{border-top:1px solid #aaa;font-size:9px;color:#888;padding-top:5px;text-align:center;margin-top:auto;}
/* Settings */
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.img-upload-card{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:16px;}
.img-upload-card h3{font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.img-upload-card p{font-size:11px;color:var(--muted);margin-bottom:12px;line-height:1.5;}
.img-preview-box{width:100%;height:100px;border-radius:8px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;overflow:hidden;margin-bottom:10px;}
.img-preview-box img{max-width:100%;max-height:96px;object-fit:contain;}
.empty-hint{font-size:11px;color:var(--muted);}
.upload-btn-wrap{position:relative;margin-bottom:8px;}
.upload-btn-wrap input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;}
/* Library select modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;display:flex;align-items:center;justify-content:center;}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;width:560px;max-height:80vh;display:flex;flex-direction:column;overflow:hidden;}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-header h3{font-size:14px;font-weight:600;}
.modal-body{flex:1;overflow-y:auto;padding:16px 20px;}
.modal-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:8px;border:1px solid var(--border);margin-bottom:8px;cursor:pointer;transition:all .15s;}
.modal-item:hover{border-color:var(--accent);background:rgba(204,179,140,.06);}
.modal-item .mi-name{font-size:13px;font-weight:500;}
.modal-item .mi-price{font-size:12px;color:var(--accent2);}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="logo">
      <h1>以太四象有限公司</h1>
      <p>報價單管理平台</p>
    </div>
    <div class="nav-section">功能</div>
    <div class="nav-item active" id="nav-quotes" onclick="navigateTo('quotes')">
      <span>📄</span> 編輯報價單
    </div>
    <div class="nav-item" id="nav-library" onclick="navigateTo('library')">
      <span>📦</span> 品項資料庫
    </div>
    <div class="nav-item" id="nav-summary" onclick="navigateTo('summary')">
      <span>📊</span> 匯總報表
    </div>
    <div class="nav-item" id="nav-settings" onclick="navigateTo('settings')">
      <span>⚙️</span> 平台設定
    </div>
    <div class="nav-section">歷史紀錄</div>
    <div class="history-list" id="history-list">
      <div style="font-size:11px;color:var(--muted);padding:8px 4px" id="history-status">● 連線中</div>
    </div>
    <div class="sidebar-bottom">
      <button class="btn btn-primary btn-full" onclick="newQuote()">＋ 新增報價單</button>
    </div>
  </div>
  <div class="main">
    <div class="topbar" id="topbar">
      <span class="topbar-title">以太四象報價單平台</span>
      <div id="sync-status" class="sync-badge"><div class="sync-dot"></div><span>連線中</span></div>
    </div>
    <div class="content" id="main-content">
      <div class="empty-state">
        <div class="es-icon">📄</div>
        <p>請選擇或建立報價單</p>
      </div>
    </div>
  </div>
</div>
<div id="toast" class="toast"></div>

<script>
// ── Firebase ──────────────────────────────────────────
const firebaseConfig={
  apiKey:"AIzaSyC2ztlrDI_sNkkZbe3CEdvO8G_BLsTujHk",
  authDomain:"aether-quotation.firebaseapp.com",
  projectId:"aether-quotation",
  storageBucket:"aether-quotation.firebasestorage.app",
  messagingSenderId:"670135588708",
  appId:"1:670135588708:web:aeaee7812d7860c9908c71"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

// ── Constants ─────────────────────────────────────────
const COMPANY={name:'以太四象有限公司',bank:'玉山銀行 (808)',account:'1230940028928',holder:'以太四象有限公司'};
const SALESPERSONS=['蘇柏屹 Bryan','黃雨晴 Eden','王亞昀 Amber'];
const TERMS={
  confirm:'此報價單具合約效力，本報價單經客戶簽章傳回後，即為正式合作約定，雙方均受本報價單所載條款之約束。',
  payment:'專案訂金：回簽報價單時支付60%；專案尾款：活動結束後翌日支付40%。',
  deadline:'訂金請於收到發票後3日內支付，如逾期未支付，本公司有權暫停或終止服務，相關損失由客戶自行承擔。',
  warranty:'非人為損壞、天災不可抗力範圍內，本公司對報價內容提供保固維護服務。',
  extra:'敬請詳閱報價備註欄中所載之注意事項，如有任何疑問，請於簽署前洽詢專案業務確認。'
};

// ── State ─────────────────────────────────────────────
let quotes=[], libItems=[], currentQuoteId=null, currentTab='form', currentView='quotes';

// ── Settings (with absolute URL defaults for images) ──
// Compute base URL dynamically so images work on GitHub Pages and locally
const BASE_URL=(()=>{
  const href=window.location.href;
  // Remove filename and query string, keep directory path
  return href.replace(/[?#].*$/,'').replace(/\/[^\/]*$/,'/');
})();
const DEFAULT_SETTINGS={logo: BASE_URL+'logo.png', stamp: BASE_URL+'stamp.png'};
let settings={...DEFAULT_SETTINGS};

function loadSettings(){
  try{
    const raw=localStorage.getItem('aether_settings');
    if(raw){
      const saved=JSON.parse(raw);
      // Only use saved value if it's a non-null, non-empty string
      settings.logo = (saved.logo && saved.logo!=='null') ? saved.logo : DEFAULT_SETTINGS.logo;
      settings.stamp = (saved.stamp && saved.stamp!=='null') ? saved.stamp : DEFAULT_SETTINGS.stamp;
    }
  }catch(e){console.warn('loadSettings error',e);}
}
function saveSettings(){
  localStorage.setItem('aether_settings', JSON.stringify(settings));
}
loadSettings();

// ── Utils ─────────────────────────────────────────────
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const today=()=>new Date().toISOString().slice(0,10);
const daysLater=n=>{const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);};
const fmt=n=>Number(n||0).toLocaleString();

// ── Toast ─────────────────────────────────────────────
let toastTimer;
function toast(msg,type='info'){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='toast show '+(type||'');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2800);
}

// ── Sync status ───────────────────────────────────────
function setSyncStatus(state){
  const el=document.getElementById('sync-status');
  if(!el)return;
  const dot=el.querySelector('.sync-dot');
  const lbl=el.querySelector('span');
  if(state==='online'){dot.className='sync-dot online';lbl.textContent='已同步';}
  else if(state==='offline'){dot.className='sync-dot offline';lbl.textContent='離線';}
  else{dot.className='sync-dot';lbl.textContent='連線中';}
  // Also update sidebar status
  const hs=document.getElementById('history-status');
  if(hs)hs.style.display='none';
}

// ── Navigation ────────────────────────────────────────
function navigateTo(view){
  currentView=view;
  ['quotes','library','summary','settings'].forEach(v=>{
    const el=document.getElementById('nav-'+v);
    if(el) el.classList.toggle('active', v===view);
  });
  if(view==='quotes'){renderHistoryList();if(currentQuoteId)openQuote(currentQuoteId);else renderEmpty();}
  else if(view==='library')renderLibrary();
  else if(view==='summary')renderSummary();
  else if(view==='settings')renderSettingsView();
}

function renderEmpty(){
  document.getElementById('topbar').innerHTML=`<span class="topbar-title">編輯報價單</span><div id="sync-status" class="sync-badge"><div class="sync-dot online"></div><span>已同步</span></div>`;
  document.getElementById('main-content').innerHTML=`<div class="empty-state"><div class="es-icon">📄</div><p>請選擇或建立報價單</p></div>`;
}

// ── Quote CRUD ────────────────────────────────────────
function newQuote(){
  const q={
    id:uid(), qno:'QT-'+new Date().getFullYear()+'-'+String(Date.now()).slice(-4),
    projectName:'', projectDate:'', eventDate:'', salesperson:SALESPERSONS[0], phone:'',
    clientCompany:'', clientContact:'', clientPhone:'', clientAddress:'',
    items:[], remarks:'', terms:{...TERMS},
    createdAt:new Date().toISOString(), updatedAt:new Date().toISOString()
  };
  saveQ(q);
  currentQuoteId=q.id;
  currentTab='form';
  toast('已建立新報價單','success');
}

function saveQ(q){
  q.updatedAt=new Date().toISOString();
  db.collection('quotes').doc(q.id).set(q).catch(e=>{console.error(e);toast('儲存失敗','error');});
}

function deleteQ(id){
  if(!confirm('確定刪除此報價單？'))return;
  db.collection('quotes').doc(id).delete().then(()=>{
    if(currentQuoteId===id){currentQuoteId=null;renderEmpty();}
    toast('已刪除','info');
  }).catch(e=>{console.error(e);toast('刪除失敗','error');});
}

function getCurrentQ(){return quotes.find(q=>q.id===currentQuoteId)||null;}

function calcQ(q){
  const revenue=q.items.reduce((s,i)=>s+(Number(i.price)||0)*(Number(i.qty)||0),0);
  const totalCost=q.items.reduce((s,i)=>s+(Number(i.cost)||0)*(Number(i.qty)||0),0);
  const tax=Math.round(revenue*0.05);
  const profit=revenue-totalCost;
  const margin=revenue>0?Math.round(profit/revenue*100):0;
  return{revenue,totalCost,tax,total:revenue+tax,profit,margin};
}

// ── History list ──────────────────────────────────────
function renderHistoryList(){
  const el=document.getElementById('history-list');
  if(!el)return;
  if(!quotes.length){
    el.innerHTML=`<div style="font-size:11px;color:var(--muted);padding:8px 4px">尚無報價單</div>`;
    return;
  }
  el.innerHTML=quotes.map(q=>`
    <div class="history-item${q.id===currentQuoteId?' active':''}" onclick="openQuote('${q.id}')">
      <div class="h-qno">${q.qno||'—'}</div>
      <div class="h-name">${q.projectName||'(未命名)'}</div>
      <div class="h-date">${(q.updatedAt||q.createdAt||'').slice(0,10)}</div>
    </div>`).join('');
}

function openQuote(id){
  currentQuoteId=id;
  currentTab='form';
  if(currentView!=='quotes'){
    currentView='quotes';
    ['quotes','library','summary','settings'].forEach(v=>{
      const el=document.getElementById('nav-'+v);
      if(el)el.classList.toggle('active',v==='quotes');
    });
  }
  renderHistoryList();
  renderQuoteEditor();
}

// ── Collect form values into quote object ─────────────
function collectForm(q){
  const g=id=>{ const el=document.getElementById(id); return el?el.value:null; };
  if(g('f-qno')!==null) q.qno=g('f-qno');
  if(g('f-project')!==null) q.projectName=g('f-project');
  if(g('f-project-date')!==null) q.projectDate=g('f-project-date');
  if(g('f-event-date')!==null) q.eventDate=g('f-event-date');
  if(g('f-salesperson')!==null) q.salesperson=g('f-salesperson');
  if(g('f-phone')!==null) q.phone=g('f-phone');
  if(g('f-client-company')!==null) q.clientCompany=g('f-client-company');
  if(g('f-client-contact')!==null) q.clientContact=g('f-client-contact');
  if(g('f-client-phone')!==null) q.clientPhone=g('f-client-phone');
  if(g('f-client-address')!==null) q.clientAddress=g('f-client-address');
  if(g('f-remarks')!==null) q.remarks=g('f-remarks');
  // terms
  ['confirm','payment','deadline','warranty','extra'].forEach(k=>{
    const el=document.getElementById('term-'+k);
    if(el) q.terms[k]=el.value;
  });
  // items
  const rows=document.querySelectorAll('.item-row');
  if(rows.length){
    q.items=Array.from(rows).map(row=>({
      name:row.querySelector('[data-f=name]')?.value||'',
      price:row.querySelector('[data-f=price]')?.value||0,
      cost:row.querySelector('[data-f=cost]')?.value||0,
      qty:row.querySelector('[data-f=qty]')?.value||1,
      unit:row.querySelector('[data-f=unit]')?.value||'式',
      note:row.querySelector('[data-f=note]')?.value||''
    }));
  }
}

// ── Quote Editor ──────────────────────────────────────
function renderQuoteEditor(){
  const q=getCurrentQ();
  if(!q)return;
  document.getElementById('topbar').innerHTML=`
    <span class="topbar-title">${q.qno} ${q.projectName?'· '+q.projectName:''}</span>
    <div id="sync-status" class="sync-badge"><div class="sync-dot online"></div><span>已同步</span></div>
    <div class="tabs">
      <button class="tab${currentTab==='form'?' active':''}" id="tab-form" onclick="switchTab('form')">填寫資料</button>
      <button class="tab${currentTab==='profit'?' active':''}" id="tab-profit" onclick="switchTab('profit')">利潤結算</button>
      <button class="tab${currentTab==='preview'?' active':''}" id="tab-preview" onclick="switchTab('preview')">預覽列印</button>
    </div>
    <button class="btn btn-danger-ghost btn-sm" onclick="deleteQ('${q.id}')">🗑 刪除</button>
    <button class="btn btn-ghost btn-sm" onclick="saveQuoteNow()">💾 儲存</button>
    <button class="btn btn-ghost btn-sm" onclick="printQuote()">🖨 列印</button>
    <button class="btn btn-primary btn-sm" id="btn-pdf" onclick="downloadPDF()">📥 下載 PDF</button>`;
  if(currentTab==='form') renderFormTab(q);
  else if(currentTab==='profit') renderProfitTab(q);
  else if(currentTab==='preview') renderPreview(q);
}

function switchTab(tab){
  const q=getCurrentQ();if(!q)return;
  collectForm(q);
  currentTab=tab;
  renderQuoteEditor();
}

function saveQuoteNow(){
  const q=getCurrentQ();if(!q)return;
  collectForm(q);
  saveQ(q);
  toast('已儲存 ✓','success');
}

function itemRowHTML(it,i){
  const sub=(Number(it.price)||0)*(Number(it.qty)||0);
  return`<tr class="item-row">
    <td style="color:var(--muted);font-size:11px">${i+1}</td>
    <td><input class="item-input" data-f="name" value="${it.name||''}" placeholder="品項名稱"></td>
    <td><input class="item-input r" data-f="price" type="number" value="${it.price||''}" placeholder="0" oninput="updateTotals()"></td>
    <td><input class="item-input r" data-f="cost" type="number" value="${it.cost||''}" placeholder="0" oninput="updateTotals()"></td>
    <td><input class="item-input r" data-f="qty" type="number" value="${it.qty||1}" min="1" oninput="updateTotals()"></td>
    <td><input class="item-input" data-f="unit" value="${it.unit||'式'}" placeholder="式"></td>
    <td style="text-align:right;font-size:12px;font-weight:500;color:var(--accent2)" class="subtotal-cell">${fmt(sub)}</td>
    <td><input class="item-input" data-f="note" value="${it.note||''}" placeholder="備註"></td>
    <td><button class="btn-icon" onclick="removeItem(this)">×</button></td>
  </tr>`;
}

function renderTotalsHTML(q){
  const c=calcQ(q);
  return`<div class="total-row"><span class="tl">小計</span><span class="tv">NT$ ${fmt(c.revenue)}</span></div>
    <div class="total-row"><span class="tl">營業稅 (5%)</span><span class="tv">NT$ ${fmt(c.tax)}</span></div>
    <div class="total-row grand"><span class="tl">總計</span><span class="tv">NT$ ${fmt(c.total)}</span></div>`;
}

function attachItemListeners(){
  document.querySelectorAll('.item-input[data-f=price],.item-input[data-f=cost],.item-input[data-f=qty]').forEach(el=>{
    el.addEventListener('input', updateTotals);
  });
}

function updateTotals(){
  const rows=document.querySelectorAll('.item-row');
  rows.forEach((row,i)=>{
    const price=Number(row.querySelector('[data-f=price]')?.value)||0;
    const qty=Number(row.querySelector('[data-f=qty]')?.value)||0;
    const cell=row.querySelector('.subtotal-cell');
    if(cell) cell.textContent=fmt(price*qty);
    // update row number
    const numCell=row.querySelector('td:first-child');
    if(numCell) numCell.textContent=i+1;
  });
  // update totals
  const q=getCurrentQ();if(!q)return;
  collectForm(q);
  const el=document.getElementById('items-totals');
  if(el) el.innerHTML=renderTotalsHTML(q);
}

function addItem(){
  const tbody=document.getElementById('items-tbody');if(!tbody)return;
  const i=tbody.querySelectorAll('.item-row').length;
  const tr=document.createElement('tr');tr.className='item-row';
  tr.innerHTML=itemRowHTML({name:'',price:'',cost:'',qty:1,unit:'式',note:''},i).replace('<tr class="item-row">','');
  // Fix: create proper row
  const temp=document.createElement('tbody');
  temp.innerHTML=itemRowHTML({name:'',price:'',cost:'',qty:1,unit:'式',note:''},i);
  const newRow=temp.querySelector('tr');
  tbody.appendChild(newRow);
  attachItemListeners();
  updateTotals();
}

function removeItem(btn){
  btn.closest('tr').remove();
  updateTotals();
}

// ── Library Modal ─────────────────────────────────────
function openLibraryModal(){
  if(!libItems.length){toast('品項資料庫是空的，請先新增品項','info');return;}
  const overlay=document.createElement('div');
  overlay.className='modal-overlay';
  overlay.id='lib-modal';
  overlay.innerHTML=`
    <div class="modal-box">
      <div class="modal-header">
        <h3>📚 從資料庫選取品項</h3>
        <button class="btn btn-ghost btn-sm" onclick="document.getElementById('lib-modal').remove()">✕ 關閉</button>
      </div>
      <div class="modal-body">
        ${libItems.map(it=>`
          <div class="modal-item" onclick="addFromLibrary('${it.id}')">
            <div>
              <div class="mi-name">${it.name}</div>
              ${it.note?`<div style="font-size:11px;color:var(--muted);margin-top:4px;line-height:1.7">${it.note.split('・').map(s=>s.trim()).filter(s=>s).map(s=>`<div>・${s}</div>`).join('')}</div>`:''}
            </div>
            <div class="mi-price">NT$ ${fmt(it.price)} <span style="color:var(--muted)">/${it.unit||'式'}</span></div>
          </div>`).join('')}
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.remove();});
}

function addFromLibrary(itemId){
  const it=libItems.find(x=>x.id===itemId);if(!it)return;
  const tbody=document.getElementById('items-tbody');if(!tbody)return;
  const i=tbody.querySelectorAll('.item-row').length;
  const temp=document.createElement('tbody');
  temp.innerHTML=itemRowHTML({name:it.name,price:it.price,cost:it.cost,qty:1,unit:it.unit||'式',note:it.note||''},i);
  const newRow=temp.querySelector('tr');
  tbody.appendChild(newRow);
  attachItemListeners();
  updateTotals();
  document.getElementById('lib-modal')?.remove();
  toast(`已加入「${it.name}」`,'success');
}

}

function printQuote(){
  const q=getCurrentQ();if(!q)return;
  collectForm(q);saveQ(q);
  currentTab='preview';renderQuoteEditor();
  setTimeout(()=>{window.print();},400);
}

async function downloadPDF(){
  const q=getCurrentQ();if(!q){toast('請先選擇報價單','error');return;}
  collectForm(q);saveQ(q);
  const btn=document.getElementById('btn-pdf');
  if(btn){btn.textContent='⏳ 產生中…';btn.disabled=true;}
  currentTab='preview';
  renderQuoteEditor();
  // Switch tab visual
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-preview')?.classList.add('active');
  await new Promise(r=>setTimeout(r,600));
  const element=document.getElementById('pdf-target');
  if(!element){toast('找不到預覽內容','error');if(btn){btn.textContent='📥 下載 PDF';btn.disabled=false;}return;}
  try{
    const filename=`${q.qno}_${(q.projectName||'報價單').replace(/[\/\\:*?"<>|]/g,'')}.pdf`;
    await html2pdf().set({
      margin:0,
      filename,
      image:{type:'jpeg',quality:0.97},
      html2canvas:{
        scale:2,useCORS:true,allowTaint:true,backgroundColor:'#ffffff',logging:false,
        onclone:(doc)=>{
          const el=doc.getElementById('pdf-target');
          if(el){el.style.margin='0';el.style.maxWidth='none';el.style.width='800px';el.style.boxShadow='none';el.style.borderRadius='0';}
        }
      },
      jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}
    }).from(element).save();
    toast('PDF 已下載 ✓','success');
  }catch(e){
    console.error(e);
    toast('PDF 產生失敗，請改用「列印」','error');
  }finally{
    if(btn){btn.textContent='📥 下載 PDF';btn.disabled=false;}
  }
}

// ── Library View ──────────────────────────────────────
let editingLibId=null;

function renderLibrary(){
  currentView='library';
  document.getElementById('topbar').innerHTML=`
    <span class="topbar-title">品項資料庫</span>
    <div id="sync-status" class="sync-badge"><div class="sync-dot online"></div><span>已同步</span></div>
    <button class="btn btn-primary btn-sm" onclick="startAddLib()">＋ 新增品項</button>`;
  const content=document.getElementById('main-content');
  const addForm=editingLibId==='__new__'?renderLibFormHTML(null):'';
  if(!libItems.length && !addForm){
    content.innerHTML=`
      ${addForm}
      <div class="empty-state"><div class="es-icon">📦</div><p>尚無品項，點擊「新增品項」開始建立</p></div>`;
    return;
  }
  content.innerHTML=`
    ${addForm}
    <div class="items-library-grid">
      ${libItems.map(it=>{
        if(editingLibId===it.id) return renderLibFormHTML(it);
        const margin=Number(it.price)>0?Math.round((Number(it.price)-Number(it.cost||0))/Number(it.price)*100):0;
        const profit=(Number(it.price)||0)-(Number(it.cost)||0);
        return`<div class="lib-card">
          <div class="lc-actions">
            <button class="btn btn-ghost btn-sm" onclick="editLib('${it.id}')">編輯</button>
            <button class="btn-icon" onclick="deleteLib('${it.id}')">×</button>
          </div>
          <div class="lc-name">${it.name}</div>
          <div class="lc-row">
            <div class="lc-field"><span class="lf-label">售價</span><span class="lf-val" style="color:var(--accent2)">NT$ ${fmt(it.price)}</span></div>
            <div class="lc-field"><span class="lf-label">成本</span><span class="lf-val">NT$ ${fmt(it.cost||0)}</span></div>
            <div class="lc-field"><span class="lf-label">單位</span><span class="lf-val">${it.unit||'式'}</span></div>
          </div>
          <div class="lc-profit">
            <span style="font-size:10px;color:var(--muted)">毛利</span>
            <span class="lp-val">NT$ ${fmt(profit)}</span>
            <span class="margin-badge ${margin>=30?'good':'warn'}">${margin}%</span>
          </div>
          ${it.note?`<div style="font-size:11px;color:var(--muted);margin-top:8px;line-height:1.7">${it.note.split('・').map(s=>s.trim()).filter(s=>s).map(s=>`<div>・${s}</div>`).join('')}</div>`:''}
        </div>`;
      }).join('')}
    </div>`;
}

function renderLibFormHTML(it){
  const isNew=!it;
  return`<div class="lib-edit-form">
    <div style="font-size:12px;font-weight:600;margin-bottom:12px">${isNew?'新增品項':'編輯品項'}</div>
    <div class="lef-grid">
      <div class="form-group"><label>品項名稱</label><input id="lf-name" value="${it?.name||''}" placeholder="品項名稱"></div>
      <div class="form-group"><label>單位</label><input id="lf-unit" value="${it?.unit||'式'}" placeholder="式"></div>
      <div class="form-group"><label>售價 (NT$)</label><input id="lf-price" type="number" value="${it?.price||''}"></div>
      <div class="form-group"><label>成本 (NT$)</label><input id="lf-cost" type="number" value="${it?.cost||''}"></div>
    </div>
    <div class="lef-grid full">
      <div class="form-group"><label>備註說明</label><textarea id="lf-note" rows="2">${it?.note||''}</textarea></div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-primary btn-sm" onclick="saveLib('${it?.id||''}')">💾 儲存</button>
      <button class="btn btn-ghost btn-sm" onclick="cancelLibEdit()">取消</button>
    </div>
  </div>`;
}

function startAddLib(){editingLibId='__new__';renderLibrary();}
function editLib(id){editingLibId=id;renderLibrary();}
function cancelLibEdit(){editingLibId=null;renderLibrary();}

function saveLib(existingId){
  const name=document.getElementById('lf-name')?.value?.trim();
  if(!name){toast('請輸入品項名稱','error');return;}
  const item={
    id:existingId||uid(),
    name,
    price:Number(document.getElementById('lf-price')?.value)||0,
    cost:Number(document.getElementById('lf-cost')?.value)||0,
    unit:document.getElementById('lf-unit')?.value||'式',
    note:document.getElementById('lf-note')?.value||'',
    createdAt:existingId?undefined:new Date().toISOString()
  };
  if(!existingId) item.createdAt=new Date().toISOString();
  db.collection('items').doc(item.id).set(item,{merge:true})
    .then(()=>{editingLibId=null;toast('已儲存 ✓','success');})
    .catch(e=>{console.error(e);toast('儲存失敗','error');});
}

function deleteLib(id){
  if(!confirm('確定刪除此品項？'))return;
  db.collection('items').doc(id).delete()
    .then(()=>toast('已刪除','info'))
    .catch(e=>{console.error(e);toast('刪除失敗','error');});
}

// ── Summary View ──────────────────────────────────────
function renderSummary(){
  currentView='summary';
  document.getElementById('topbar').innerHTML=`
    <span class="topbar-title">匯總報表</span>
    <div id="sync-status" class="sync-badge"><div class="sync-dot online"></div><span>已同步</span></div>`;
  const totalRevenue=quotes.reduce((s,q)=>{const c=calcQ(q);return s+c.revenue;},0);
  const totalTax=quotes.reduce((s,q)=>{const c=calcQ(q);return s+c.tax;},0);
  const totalProfit=quotes.reduce((s,q)=>{const c=calcQ(q);return s+c.profit;},0);
  const avgMargin=totalRevenue>0?Math.round(totalProfit/totalRevenue*100):0;
  document.getElementById('main-content').innerHTML=`
    <div class="summary-grid">
      <div class="stat-card"><div class="s-label">報價單總數</div><div class="s-val gold">${quotes.length}</div></div>
      <div class="stat-card"><div class="s-label">總收入（未稅）</div><div class="s-val gold">NT$ ${fmt(totalRevenue)}</div></div>
      <div class="stat-card"><div class="s-label">總毛利</div><div class="s-val ${totalProfit>=0?'green':'red'}">NT$ ${fmt(totalProfit)}</div></div>
      <div class="stat-card"><div class="s-label">平均毛利率</div><div class="s-val ${avgMargin>=30?'green':avgMargin>=10?'gold':'red'}">${avgMargin}%</div></div>
    </div>
    <div class="summary-table">
      <table>
        <thead><tr>
          <th>編號</th><th>專案名稱</th><th>業務</th><th>日期</th>
          <th class="r">收入</th><th class="r">成本</th><th class="r">毛利</th><th class="r">毛利率</th>
        </tr></thead>
        <tbody>
          ${quotes.map(q=>{
            const c=calcQ(q);
            return`<tr style="cursor:pointer" onclick="openQuote('${q.id}')">
              <td style="color:var(--accent2);font-weight:600">${q.qno||'—'}</td>
              <td>${q.projectName||'(未命名)'}</td>
              <td style="color:var(--muted)">${q.salesperson||'—'}</td>
              <td style="color:var(--muted)">${(q.projectDate||q.createdAt||'').slice(0,10)}</td>
              <td class="r">$${fmt(c.revenue)}</td>
              <td class="r">$${fmt(c.totalCost)}</td>
              <td class="r" style="color:${c.profit>=0?'var(--success)':'var(--danger)'}">$${fmt(c.profit)}</td>
              <td class="r"><span class="margin-badge ${c.margin>=30?'good':'warn'}">${c.margin}%</span></td>
            </tr>`;}).join('')}
        </tbody>
      </table>
    </div>`;
}

// ── Settings View ─────────────────────────────────────
function renderSettingsView(){
  currentView='settings';
  document.getElementById('topbar').innerHTML=`<span class="topbar-title">平台設定</span><div id="sync-status" class="sync-badge"><div class="sync-dot online"></div><span>已同步</span></div>`;
  const isDefaultLogo=settings.logo===DEFAULT_SETTINGS.logo;
  const isDefaultStamp=settings.stamp===DEFAULT_SETTINGS.stamp;
  const logoTag=isDefaultLogo
    ?`<span style="font-size:10px;color:var(--success);background:rgba(90,171,143,.15);padding:2px 7px;border-radius:10px">✓ 預設圖片</span>`
    :`<span style="font-size:10px;color:var(--accent2);background:rgba(204,179,140,.15);padding:2px 7px;border-radius:10px">已自訂</span>`;
  const stampTag=isDefaultStamp
    ?`<span style="font-size:10px;color:var(--success);background:rgba(90,171,143,.15);padding:2px 7px;border-radius:10px">✓ 預設圖片</span>`
    :`<span style="font-size:10px;color:var(--accent2);background:rgba(204,179,140,.15);padding:2px 7px;border-radius:10px">已自訂</span>`;
  document.getElementById('main-content').innerHTML=`
    <div class="section-card" style="max-width:700px">
      <div class="section-card-title">🖼 報價單圖片設定</div>
      <p style="font-size:12px;color:var(--muted);margin-bottom:20px;line-height:1.6">LOGO 和印章已內建於平台，所有人開啟都會自動顯示。如需替換，可在此上傳自訂版本（儲存於此瀏覽器）。</p>
      <div class="settings-grid">
        <div class="img-upload-card">
          <h3>公司 LOGO ${logoTag}</h3>
          <p>顯示於報價單左上角，建議使用白底或透明底 PNG。</p>
          <div class="img-preview-box" style="background:#3a3a3a">
            <img src="${settings.logo}" alt="LOGO" onerror="this.style.display='none'" style="max-height:96px;max-width:100%;object-fit:contain;">
          </div>
          <div class="upload-btn-wrap">
            <button class="btn btn-ghost btn-sm btn-full">📁 選擇 LOGO 圖片</button>
            <input type="file" accept="image/*" onchange="handleImgUpload(event,'logo')">
          </div>
          ${!isDefaultLogo?`<button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="clearImg('logo')">↩ 還原預設</button>`:''}
        </div>
        <div class="img-upload-card">
          <h3>統一發票專用章 ${stampTag}</h3>
          <p>顯示於報價單左下角匯款帳戶旁，建議使用透明底 PNG。</p>
          <div class="img-preview-box">
            <img src="${settings.stamp}" alt="印章" onerror="this.style.display='none'" style="max-height:96px;max-width:100%;object-fit:contain;">
          </div>
          <div class="upload-btn-wrap">
            <button class="btn btn-ghost btn-sm btn-full">📁 選擇印章圖片</button>
            <input type="file" accept="image/*" onchange="handleImgUpload(event,'stamp')">
          </div>
          ${!isDefaultStamp?`<button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="clearImg('stamp')">↩ 還原預設</button>`:''}
        </div>
      </div>
    </div>`;
}

function handleImgUpload(event, key){
  const file=event.target.files[0];if(!file)return;
  if(file.size>2*1024*1024){toast('圖片不能超過 2MB','error');return;}
  const reader=new FileReader();
  reader.onload=e=>{
    settings[key]=e.target.result;
    saveSettings();
    renderSettingsView();
    toast(`${key==='logo'?'LOGO':'印章'}已上傳 ✓`,'success');
  };
  reader.readAsDataURL(file);
}
function clearImg(key){
  settings[key]=DEFAULT_SETTINGS[key];
  saveSettings();
  renderSettingsView();
  toast('已還原預設圖片','info');
}

  setSyncStatus('online');
  if(currentView==='quotes'){
    renderHistoryList();
    if(currentQuoteId && !quotes.find(q=>q.id===currentQuoteId)){
      currentQuoteId=null;renderEmpty();

db.collection('items').orderBy('createdAt','desc').onSnapshot(snap=>{
  libItems=snap.docs.map(d=>({id:d.id,...d.data()}));
  if(currentView==='library') renderLibrary();
},err=>{console.error('Items listener error:',err);});
</script>
