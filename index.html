<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>以太四象｜報價單平台</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
  :root {
    --bg: #0c0d10; --surface: #14161a; --surface2: #1c1f24;
    --border: #282c34; --accent: #ccb38c; --accent2: #ddc9a6;
    --text: #e6e3dc; --muted: #888480; --success: #5aab8f;
    --danger: #c97b7b; --gold: #ccb38c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', 'PingFang TC', 'Noto Sans TC', sans-serif; min-height: 100vh; }

  .app { display: flex; height: 100vh; overflow: hidden; }
  .sidebar { width: 260px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .content { flex: 1; overflow-y: auto; padding: 24px; }

  .logo { padding: 20px 16px; border-bottom: 1px solid var(--border); }
  .logo h1 { font-size: 16px; font-weight: 700; color: var(--accent2); letter-spacing: 1px; }
  .logo p { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .nav { padding: 12px 8px; }
  .nav-section { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; padding: 8px 8px 4px; margin-top: 8px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; color: var(--muted); transition: all 0.15s; margin-bottom: 2px; }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: rgba(204,179,140,0.12); color: var(--accent2); }
  .nav-item .icon { font-size: 16px; width: 20px; text-align: center; }
  .quote-list { padding: 0 8px 8px; flex: 1; overflow-y: auto; }
  .quote-list-item { padding: 10px 12px; border-radius: 8px; cursor: pointer; margin-bottom: 4px; border: 1px solid transparent; transition: all 0.15s; }
  .quote-list-item:hover { background: var(--surface2); }
  .quote-list-item.active { border-color: var(--accent); background: rgba(204,179,140,0.08); }
  .quote-list-item .qno { font-size: 12px; font-weight: 600; color: var(--accent2); }
  .quote-list-item .qname { font-size: 12px; color: var(--text); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .quote-list-item .qdate { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .sidebar-actions { padding: 12px; border-top: 1px solid var(--border); display: flex; gap: 8px; }

  .topbar { height: 56px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; gap: 12px; }
  .topbar h2 { font-size: 15px; font-weight: 600; flex: 1; }
  .tabs { display: flex; gap: 4px; background: var(--bg); border-radius: 8px; padding: 4px; }
  .tab { padding: 6px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; color: var(--muted); transition: all 0.15s; border: none; background: none; }
  .tab.active { background: var(--accent); color: #0c0d10; font-weight: 600; }

  .btn { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px; }
  .btn-primary { background: var(--accent); color: #0c0d10; font-weight: 600; }
  .btn-primary:hover { background: var(--accent2); }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); }
  .btn-danger { background: rgba(201,123,123,0.15); color: var(--danger); border: 1px solid rgba(201,123,123,0.3); }
  .btn-danger:hover { background: rgba(201,123,123,0.25); }
  .btn-success { background: rgba(90,171,143,0.15); color: var(--success); border: 1px solid rgba(90,171,143,0.3); }
  .btn-success:hover { background: rgba(90,171,143,0.25); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-icon { padding: 6px; border-radius: 6px; }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: 12px; color: var(--muted); font-weight: 500; }
  input, textarea, select {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); padding: 9px 12px; font-size: 13px; width: 100%;
    transition: border-color 0.15s; font-family: inherit;
  }
  input:focus, textarea:focus, select:focus { outline: none; border-color: var(--accent); }
  textarea { resize: vertical; min-height: 80px; }
  select option { background: var(--surface2); }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .card-title { font-size: 13px; font-weight: 600; color: var(--accent2); display: flex; align-items: center; gap: 8px; }
  .badge { background: rgba(204,179,140,0.15); color: var(--accent2); font-size: 11px; padding: 2px 8px; border-radius: 20px; }

  .items-table { width: 100%; border-collapse: collapse; }
  .items-table th { font-size: 11px; color: var(--muted); text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .items-table td { padding: 6px 4px; vertical-align: middle; }
  .items-table td input { padding: 7px 10px; font-size: 13px; }
  .items-table tr { border-bottom: 1px solid rgba(40,44,52,0.8); }
  .num-col { width: 100px; }
  .qty-col { width: 80px; }
  .unit-col { width: 70px; }
  .sub-col { width: 110px; }
  .note-col { width: 130px; }
  .del-col { width: 40px; }
  .item-no { font-size: 12px; color: var(--muted); text-align: center; }
  .subtotal-val { font-size: 13px; color: var(--gold); font-weight: 500; text-align: right; padding-right: 10px; }

  .totals { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; margin-top: 16px; }
  .total-row { display: flex; align-items: center; gap: 24px; font-size: 13px; }
  .total-label { color: var(--muted); min-width: 100px; text-align: right; }
  .total-val { min-width: 120px; text-align: right; font-weight: 500; }
  .total-row.grand { font-size: 16px; font-weight: 700; color: var(--gold); border-top: 1px solid var(--border); padding-top: 10px; }

  .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
  .product-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 14px; cursor: pointer; transition: all 0.15s; position: relative; }
  .product-card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .product-card.selected { border-color: var(--success); background: rgba(90,171,143,0.06); }
  .product-card .pc-name { font-size: 13px; font-weight: 600; margin-bottom: 6px; }
  .product-card .pc-price { font-size: 12px; color: var(--gold); }
  .product-card .pc-cost { font-size: 12px; color: var(--muted); }
  .product-card .pc-margin { font-size: 11px; color: var(--success); }

  .profit-table { width: 100%; border-collapse: collapse; }
  .profit-table th { font-size: 11px; color: var(--muted); padding: 8px 12px; border-bottom: 1px solid var(--border); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .profit-table th:not(:first-child) { text-align: right; }
  .profit-table td { font-size: 13px; padding: 10px 12px; border-bottom: 1px solid rgba(40,44,52,0.6); }
  .profit-table td:not(:first-child) { text-align: right; }
  .profit-table tr:last-child td { border-bottom: none; }
  .profit-table .pt-rev { color: var(--gold); }
  .profit-table .pt-cost { color: var(--muted); }
  .profit-table .pt-profit-pos { color: var(--success); font-weight: 600; }
  .profit-table .pt-profit-neg { color: var(--danger); font-weight: 600; }
  .profit-kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
  .kpi-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
  .kpi-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .kpi-val { font-size: 20px; font-weight: 700; }
  .kpi-val.gold { color: var(--gold); }
  .kpi-val.green { color: var(--success); }
  .kpi-val.red { color: var(--danger); }
  .kpi-val.white { color: var(--text); }

  .summary-table { width: 100%; border-collapse: collapse; }
  .summary-table th { font-size: 11px; color: var(--muted); padding: 10px 14px; border-bottom: 1px solid var(--border); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; text-align: left; white-space: nowrap; }
  .summary-table th.r { text-align: right; }
  .summary-table td { font-size: 13px; padding: 12px 14px; border-bottom: 1px solid rgba(40,44,52,0.6); }
  .summary-table td.r { text-align: right; }
  .summary-table tr:hover td { background: var(--surface2); }
  .summary-table tr:last-child td { border-bottom: none; }
  .summary-bar { height: 4px; background: var(--border); border-radius: 2px; margin-top: 4px; overflow: hidden; }
  .summary-bar-fill { height: 100%; border-radius: 2px; background: var(--success); }
  .chip { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .chip-green { background: rgba(90,171,143,0.2); color: var(--success); }
  .chip-red { background: rgba(201,123,123,0.2); color: var(--danger); }
  .chip-gold { background: rgba(204,179,140,0.2); color: var(--gold); }

  #preview-pane { display: none; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 24px; min-width: 340px; max-width: 500px; width: 90%; max-height: 90vh; overflow-y: auto; }
  .modal h3 { font-size: 15px; margin-bottom: 16px; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

  @media print {
    body { background: #fff; }
    .app { display: block; height: auto; }
    .sidebar, .topbar, #editor-pane, .no-print { display: none !important; }
    #preview-pane { display: block !important; }
    .preview-wrap { box-shadow: none; }
  }

  /* 預覽樣式 */
  .preview-wrap {
    background: #fff; color: #111; width: 800px; margin: 0 auto;
    padding: 40px 44px; box-shadow: 0 4px 40px rgba(0,0,0,0.5);
    border-radius: 4px; font-family: 'PingFang TC', 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
  }
  .pv-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; }
  .pv-brand strong { display: block; font-size: 16px; color: #111; font-weight: 700; letter-spacing: 2px; }
  .pv-brand span { display: block; font-size: 11px; color: #888; letter-spacing: 1px; margin-top: 3px; }
  .pv-title { font-size: 24px; font-weight: 800; letter-spacing: 6px; color: #222; }
  .pv-sections { display: grid; grid-template-columns: 1fr 1fr; border: 1px solid #ddd; }
  .pv-section { padding: 12px 16px; }
  .pv-section:first-child { border-right: 1px solid #ddd; }
  .pv-section-title { font-size: 9px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 7px; border-bottom: 1px solid #eee; padding-bottom: 4px; }
  .pv-field { display: flex; font-size: 11px; margin-bottom: 4px; }
  .pv-field-label { color: #888; min-width: 56px; flex-shrink: 0; }
  .pv-field-val { color: #111; font-weight: 500; flex: 1; white-space: pre-line; }
  .pv-terms { border: 1px solid #ddd; border-top: none; padding: 10px 16px; }
  .pv-terms-title { font-size: 9px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; border-bottom: 1px solid #eee; padding-bottom: 4px; }
  .pv-term { display: flex; font-size: 10px; margin-bottom: 3px; line-height: 1.5; }
  .pv-term-label { color: #888; min-width: 52px; flex-shrink: 0; }
  .pv-term-val { color: #333; }
  .pv-items { border: 1px solid #ddd; border-top: none; }
  .pv-items-header { background: #f5f5f5; display: grid; grid-template-columns: 32px 1fr 80px 52px 52px 80px; font-size: 10px; font-weight: 700; color: #555; padding: 6px 10px; border-bottom: 1px solid #ddd; }
  .pv-item-row { display: grid; grid-template-columns: 32px 1fr 80px 52px 52px 80px; font-size: 11px; padding: 7px 10px; border-bottom: 1px solid #eee; align-items: start; }
  .pv-item-row:last-child { border-bottom: none; }
  .pv-items-header > *, .pv-item-row > * { padding: 0 3px; }
  .pv-num { text-align: center; }
  .pv-money { text-align: right; }
  .pv-totals { border: 1px solid #ddd; border-top: none; padding: 8px 16px; display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
  .pv-total-row { display: flex; gap: 28px; font-size: 11px; }
  .pv-total-label { color: #888; min-width: 80px; text-align: right; }
  .pv-total-val { min-width: 90px; text-align: right; font-weight: 500; }
  .pv-total-row.grand-row { font-size: 13px; font-weight: 700; border-top: 1px solid #ddd; padding-top: 6px; margin-top: 2px; }
  .pv-footer { border: 1px solid #ddd; border-top: none; display: grid; grid-template-columns: 1fr 1fr; }
  .pv-bank { padding: 12px 16px; border-right: 1px solid #ddd; }
  .pv-bank-title { font-size: 9px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .pv-bank p { font-size: 11px; color: #333; margin-bottom: 2px; }
  .pv-sig { padding: 12px 16px; display: flex; flex-direction: column; justify-content: flex-end; }
  .pv-sig-title { font-size: 9px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 28px; }
  .pv-sig-line { border-top: 1px solid #bbb; padding-top: 5px; font-size: 10px; color: #999; text-align: center; }
  .pv-section-title-row { font-size: 9px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 1px; padding: 7px 16px 4px; border: 1px solid #ddd; border-top: none; background: #fafafa; }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .empty-state { text-align: center; padding: 48px 24px; color: var(--muted); }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface2); border: 1px solid var(--border); padding: 12px 20px; border-radius: 10px; font-size: 13px; z-index: 999; opacity: 0; transform: translateY(10px); transition: all 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.success { border-color: var(--success); color: var(--success); }
  .toast.error { border-color: var(--danger); color: var(--danger); }
  .check-circle { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; }
  .product-card.selected .check-circle { background: var(--success); border-color: var(--success); color: #fff; }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="logo"><h1>以太四象</h1><p>報價單管理平台</p></div>
    <div class="nav">
      <div class="nav-section">功能</div>
      <div class="nav-item active" onclick="showPage('editor')" id="nav-editor"><span class="icon">📄</span> 編輯報價單</div>
      <div class="nav-item" onclick="showPage('db')" id="nav-db"><span class="icon">📦</span> 品項資料庫</div>
      <div class="nav-item" onclick="showPage('summary')" id="nav-summary"><span class="icon">📊</span> 匯總報表</div>
    </div>
    <div class="nav-section" style="padding:8px 16px 4px">歷史紀錄</div>
    <div class="quote-list" id="quote-list"></div>
    <div class="sidebar-actions">
      <button class="btn btn-primary" style="flex:1" onclick="newQuote()">＋ 新增報價單</button>
    </div>
  </div>
  <div class="main">
    <div class="topbar">
      <h2 id="topbar-title">編輯報價單</h2>
      <div class="tabs" id="tabs" style="display:none">
        <button class="tab active" onclick="switchTab('form')" id="tab-form">填寫資料</button>
        <button class="tab" onclick="switchTab('profit')" id="tab-profit">利潤結算</button>
        <button class="tab" onclick="switchTab('preview')" id="tab-preview">預覽列印</button>
      </div>
      <div id="topbar-actions" style="display:flex;gap:8px"></div>
    </div>
    <div class="content" id="main-content"></div>
  </div>
</div>
<div class="modal-overlay" id="modal"><div class="modal" id="modal-body"></div></div>
<div class="toast" id="toast"></div>

<script>
let quotes = JSON.parse(localStorage.getItem('ether_quotes') || '[]');
let products = JSON.parse(localStorage.getItem('ether_products') || '[]');
let currentQuoteId = null, currentPage = 'editor', currentTab = 'form';

const COMPANY = { name:'以太四象有限公司', bank:'玉山銀行 (808)', account:'1230940028928', holder:'以太四象有限公司' };
const SALESPERSONS = ['蘇柏屹 Bryan','黃雨晴 Eden','王亞昀 Amber'];
const TERMS = {
  confirm:'此報價單具合約效力，本報價單經簽章傳回後，即為正式合作約定，不可要求全額退款。若因個人因素需中止專案，除訂金全額不予退回外，需另外支付已產生之費用。',
  payment:'專案訂金：回簽報價單時支付60%；專案尾款：活動結束後翌日支付40%。',
  deadline:'訂金請於收到發票後3日內支付，收到訂金後方可啟動專案。剩餘期數款項請於收到發票後7日內完成匯款支付。若未依約定期程付款，我方有權逕行停止作品之展示與使用，取回產品、設備之所有權。',
  warranty:'非人損、天災範圍，對報價內容提供保固維護。',
  extra:'敬請詳閱報價備註欄中所載之注意事項。如報價單中未詳盡之事項，需另訂定合約，雙方需事先議定。',
};

if (!products.length) {
  products = [
    {id:uid(),name:'LED 顯示幕租賃',price:15000,cost:8000,unit:'式',note:'含安裝拆除'},
    {id:uid(),name:'燈光設備租賃',price:8000,cost:4000,unit:'式',note:''},
    {id:uid(),name:'音響設備租賃',price:12000,cost:6500,unit:'式',note:''},
    {id:uid(),name:'互動裝置開發',price:50000,cost:28000,unit:'式',note:'依規格報價'},
    {id:uid(),name:'現場技術人員',price:3500,cost:2000,unit:'人/天',note:''},
    {id:uid(),name:'活動策劃顧問',price:20000,cost:8000,unit:'式',note:''},
  ]; saveProducts();
}

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function saveQuotes(){localStorage.setItem('ether_quotes',JSON.stringify(quotes));}
function saveProducts(){localStorage.setItem('ether_products',JSON.stringify(products));}
function today(){return new Date().toISOString().slice(0,10);}
function daysLater(n){const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);}
function nextQno(){return `QT-${new Date().getFullYear()}-${String(quotes.length+1).padStart(3,'0')}`;}
function fmt(n){return Number(n||0).toLocaleString('zh-TW');}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escHTML(s){return esc(s);}
function toast(msg,type=''){const el=document.getElementById('toast');el.textContent=msg;el.className='toast show '+type;setTimeout(()=>el.classList.remove('show'),2500);}

function newBlankQuote(){
  return {id:uid(),qno:nextQno(),date:today(),validDate:daysLater(14),
    projectName:'',projectNote:'',salesperson:SALESPERSONS[0],salespersonPhone:'',
    clientName:'',clientContact:'',clientPhone:'',clientAddress:'',
    items:[{id:uid(),name:'',price:0,cost:0,qty:1,unit:'式',note:''}],
    terms:{...TERMS},createdAt:new Date().toISOString()};
}

function calcFinancials(q){
  const revenue=q.items.reduce((s,i)=>s+(i.price*i.qty||0),0);
  const totalCost=q.items.reduce((s,i)=>s+((i.cost||0)*i.qty||0),0);
  const tax=Math.round(revenue*0.05);
  return{revenue,totalCost,tax,revenueWithTax:revenue+tax,profit:revenue-totalCost,margin:revenue>0?(revenue-totalCost)/revenue*100:0};
}

function showPage(page){
  currentPage=page;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  document.getElementById('nav-'+page)?.classList.add('active');
  const tabs=document.getElementById('tabs'),title=document.getElementById('topbar-title'),actions=document.getElementById('topbar-actions');
  if(page==='editor'){
    tabs.style.display='flex'; title.textContent='編輯報價單';
    actions.innerHTML=`<button class="btn btn-ghost btn-sm" onclick="deleteCurrentQuote()">🗑 刪除</button>
      <button class="btn btn-success btn-sm" onclick="saveCurrentQuote()">💾 儲存</button>
      <button class="btn btn-ghost btn-sm" onclick="printQuote()">🖨 列印</button>
      <button class="btn btn-primary btn-sm" id="btn-pdf" onclick="downloadPDF()">📥 下載 PDF</button>`;
    renderEditor();
  } else if(page==='db'){
    tabs.style.display='none'; title.textContent='品項資料庫';
    actions.innerHTML=`<button class="btn btn-primary btn-sm" onclick="openAddProduct()">＋ 新增品項</button>`;
    renderDB();
  } else {
    tabs.style.display='none'; title.textContent='匯總報表'; actions.innerHTML=''; renderSummary();
  }
}

function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  if(tab==='form') renderEditor();
  else if(tab==='profit') renderProfit();
  else renderPreview();
}

function renderQuoteList(){
  const list=document.getElementById('quote-list');
  if(!quotes.length){list.innerHTML=`<div style="padding:12px 16px;font-size:12px;color:var(--muted)">尚無報價單</div>`;return;}
  list.innerHTML=[...quotes].reverse().map(q=>`
    <div class="quote-list-item ${q.id===currentQuoteId?'active':''}" onclick="loadQuote('${q.id}')">
      <div class="qno">${q.qno}</div><div class="qname">${q.projectName||'（未命名專案）'}</div><div class="qdate">${q.date}</div>
    </div>`).join('');
}

function loadQuote(id){const q=quotes.find(x=>x.id===id);if(!q)return;currentQuoteId=id;currentTab='form';showPage('editor');renderQuoteList();}
function newQuote(){const q=newBlankQuote();quotes.push(q);saveQuotes();currentQuoteId=q.id;currentTab='form';showPage('editor');renderQuoteList();}
function saveCurrentQuote(){const q=getCurrentQuote();if(!q)return;collectFormData(q);saveQuotes();renderQuoteList();toast('報價單已儲存 ✓','success');}
function getCurrentQuote(){return quotes.find(q=>q.id===currentQuoteId);}

function deleteCurrentQuote(){
  if(!currentQuoteId)return;
  openModal(`<h3>確認刪除</h3><p style="color:var(--muted);font-size:13px;margin-top:8px">確定要刪除此報價單嗎？</p>
    <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">取消</button><button class="btn btn-danger" onclick="confirmDelete()">確認刪除</button></div>`);
}
function confirmDelete(){
  quotes=quotes.filter(q=>q.id!==currentQuoteId);saveQuotes();currentQuoteId=null;closeModal();
  if(quotes.length){currentQuoteId=quotes[quotes.length-1].id;renderQuoteList();renderEditor();}else newQuote();
}

function renderEditor(){
  const content=document.getElementById('main-content');
  if(currentTab!=='form'){if(currentTab==='profit')renderProfit();else renderPreview();return;}
  const q=getCurrentQuote();
  if(!q){content.innerHTML=`<div class="empty-state"><div class="icon">📄</div><p>請先新增一份報價單</p><button class="btn btn-primary" style="margin-top:16px" onclick="newQuote()">＋ 新增報價單</button></div>`;return;}
  content.innerHTML=`<div id="editor-pane">
    <div class="card"><div class="card-header"><div class="card-title">📋 報價資訊</div></div>
      <div class="form-grid">
        <div class="form-group"><label>報價單號</label><input id="f-qno" value="${esc(q.qno)}"></div>
        <div class="form-group"><label>專案業務</label><select id="f-salesperson">${SALESPERSONS.map(s=>`<option value="${esc(s)}" ${s===q.salesperson?'selected':''}>${esc(s)}</option>`).join('')}</select></div>
        <div class="form-group"><label>業務電話</label><input id="f-salespersonPhone" value="${esc(q.salespersonPhone||'')}" placeholder="業務聯絡電話"></div>
        <div class="form-group"><label>報價日期</label><input id="f-date" type="date" value="${q.date}"></div>
        <div class="form-group"><label>有效日期</label><input id="f-validDate" type="date" value="${q.validDate}"></div>
      </div>
    </div>
    <div class="card"><div class="card-header"><div class="card-title">🗂 專案資訊</div></div>
      <div class="form-grid">
        <div class="form-group full"><label>專案名稱</label><input id="f-projectName" value="${esc(q.projectName)}" placeholder="請輸入專案名稱"></div>
        <div class="form-group full"><label>專案備註</label><textarea id="f-projectNote" rows="3" placeholder="執行地點：&#10;執行期間：&#10;預估人次：">${esc(q.projectNote)}</textarea></div>
      </div>
    </div>
    <div class="card"><div class="card-header"><div class="card-title">👤 客戶資訊</div></div>
      <div class="form-grid">
        <div class="form-group"><label>客戶公司名稱</label><input id="f-clientName" value="${esc(q.clientName)}" placeholder="客戶公司名稱"></div>
        <div class="form-group"><label>聯絡人</label><input id="f-clientContact" value="${esc(q.clientContact)}" placeholder="聯絡人姓名"></div>
        <div class="form-group"><label>電話</label><input id="f-clientPhone" value="${esc(q.clientPhone||'')}" placeholder="聯絡電話"></div>
        <div class="form-group"><label>地址</label><input id="f-clientAddress" value="${esc(q.clientAddress)}" placeholder="客戶地址"></div>
      </div>
    </div>
    <div class="card"><div class="card-header"><div class="card-title">💰 報價內容</div>
        <div style="display:flex;gap:8px"><button class="btn btn-ghost btn-sm" onclick="openProductPicker()">📦 從資料庫選取</button><button class="btn btn-ghost btn-sm" onclick="addItem()">＋ 新增品項</button></div>
      </div>
      <table class="items-table"><thead><tr>
        <th style="width:36px">#</th><th>內容</th>
        <th class="num-col">售價 (NT$)</th><th class="num-col">成本 (NT$)</th>
        <th class="qty-col">數量</th><th class="unit-col">單位</th>
        <th class="sub-col">小計</th><th class="note-col">備註</th><th class="del-col"></th>
      </tr></thead>
      <tbody id="items-body">${q.items.map((item,i)=>renderItemRow(item,i)).join('')}</tbody></table>
      <div class="totals">${renderTotals(q)}</div>
    </div>
    <div class="card"><div class="card-header"><div class="card-title">📜 報價條款</div><button class="btn btn-ghost btn-sm" onclick="resetTerms()">↺ 還原預設</button></div>
      <div class="form-grid">
        <div class="form-group full"><label>合作確認</label><textarea id="f-t-confirm" rows="3">${esc(q.terms.confirm)}</textarea></div>
        <div class="form-group full"><label>付款方式</label><textarea id="f-t-payment" rows="2">${esc(q.terms.payment)}</textarea></div>
        <div class="form-group full"><label>付款期限</label><textarea id="f-t-deadline" rows="3">${esc(q.terms.deadline)}</textarea></div>
        <div class="form-group full"><label>保固範圍</label><textarea id="f-t-warranty" rows="2">${esc(q.terms.warranty)}</textarea></div>
        <div class="form-group full"><label>補充條款</label><textarea id="f-t-extra" rows="2">${esc(q.terms.extra)}</textarea></div>
      </div>
    </div>
  </div>`;
}

function renderItemRow(item,i){
  return `<tr id="row-${item.id}">
    <td class="item-no">${i+1}</td>
    <td><input value="${esc(item.name)}" placeholder="品項名稱" oninput="updateItem('${item.id}','name',this.value)"></td>
    <td><input class="num-col" type="number" value="${item.price}" min="0" oninput="updateItem('${item.id}','price',this.value)"></td>
    <td><input class="num-col" type="number" value="${item.cost||0}" min="0" style="color:var(--muted)" oninput="updateItem('${item.id}','cost',this.value)"></td>
    <td><input class="qty-col" type="number" value="${item.qty}" min="0" oninput="updateItem('${item.id}','qty',this.value)"></td>
    <td><input class="unit-col" value="${esc(item.unit)}" oninput="updateItem('${item.id}','unit',this.value)"></td>
    <td class="subtotal-val" id="sub-${item.id}">${fmt(item.price*item.qty||0)}</td>
    <td><input class="note-col" value="${esc(item.note)}" placeholder="備註" oninput="updateItem('${item.id}','note',this.value)"></td>
    <td><button class="btn btn-icon btn-ghost" style="color:var(--danger)" onclick="removeItem('${item.id}')">✕</button></td>
  </tr>`;
}

function renderTotals(q){
  const{revenue,tax,revenueWithTax}=calcFinancials(q);
  return `<div class="total-row"><span class="total-label">小計</span><span class="total-val">${fmt(revenue)}</span></div>
    <div class="total-row"><span class="total-label">營業稅 (5%)</span><span class="total-val">${fmt(tax)}</span></div>
    <div class="total-row grand"><span class="total-label">總計</span><span class="total-val" style="color:var(--gold)">${fmt(revenueWithTax)}</span></div>`;
}

function updateItem(id,field,value){
  const q=getCurrentQuote();if(!q)return;
  const item=q.items.find(i=>i.id===id);if(!item)return;
  if(['price','cost','qty'].includes(field))value=parseFloat(value)||0;
  item[field]=value;
  const subEl=document.getElementById('sub-'+id);if(subEl)subEl.textContent=fmt(item.price*item.qty||0);
  const totalsEl=document.querySelector('.totals');if(totalsEl)totalsEl.innerHTML=renderTotals(q);
}
function addItem(){
  const q=getCurrentQuote();if(!q)return;
  const item={id:uid(),name:'',price:0,cost:0,qty:1,unit:'式',note:''};q.items.push(item);
  const tbody=document.getElementById('items-body');if(tbody)tbody.insertAdjacentHTML('beforeend',renderItemRow(item,q.items.length-1));
  const totalsEl=document.querySelector('.totals');if(totalsEl)totalsEl.innerHTML=renderTotals(q);
}
function removeItem(id){
  const q=getCurrentQuote();if(!q)return;
  if(q.items.length<=1){toast('至少需要一個品項','error');return;}
  q.items=q.items.filter(i=>i.id!==id);document.getElementById('row-'+id)?.remove();
  document.querySelectorAll('#items-body tr').forEach((r,i)=>{const no=r.querySelector('.item-no');if(no)no.textContent=i+1;});
  const totalsEl=document.querySelector('.totals');if(totalsEl)totalsEl.innerHTML=renderTotals(q);
}
function collectFormData(q){
  const g=id=>{const el=document.getElementById(id);return el?el.value:'';};
  q.qno=g('f-qno');q.salesperson=g('f-salesperson');q.salespersonPhone=g('f-salespersonPhone');
  q.date=g('f-date');q.validDate=g('f-validDate');q.projectName=g('f-projectName');q.projectNote=g('f-projectNote');
  q.clientName=g('f-clientName');q.clientContact=g('f-clientContact');q.clientPhone=g('f-clientPhone');q.clientAddress=g('f-clientAddress');
  q.terms.confirm=g('f-t-confirm');q.terms.payment=g('f-t-payment');q.terms.deadline=g('f-t-deadline');q.terms.warranty=g('f-t-warranty');q.terms.extra=g('f-t-extra');
}
function resetTerms(){['confirm','payment','deadline','warranty','extra'].forEach(k=>{const el=document.getElementById('f-t-'+k);if(el)el.value=TERMS[k];});toast('條款已還原為預設值');}

let pickerSelected=new Set();
function openProductPicker(){
  pickerSelected=new Set();
  const cards=products.map(p=>{
    const m=p.price>0?Math.round((p.price-(p.cost||0))/p.price*100):0;
    return `<div class="product-card" id="pp-${p.id}" onclick="togglePicker('${p.id}')">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
        <div style="flex:1;min-width:0">
          <div class="pc-name">${esc(p.name)}</div>
          <div class="pc-price">售 NT$ ${fmt(p.price)} / ${esc(p.unit)}</div>
          <div class="pc-cost">成本 NT$ ${fmt(p.cost||0)}</div>
          ${p.note?`<div style="margin-top:5px;font-size:12px;color:var(--muted);white-space:pre-line;line-height:1.5">${esc(p.note)}</div>`:''}
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
          <div class="check-circle" id="chk-${p.id}"></div>
          <span class="chip chip-${m>=40?'green':m>=20?'gold':'red'}" style="font-size:10px">${m}%</span>
        </div>
      </div></div>`;
  }).join('');
  openModal(`<h3>📦 從品項資料庫選取</h3>
    <p style="font-size:12px;color:var(--muted);margin:8px 0 14px">點選品項加入報價單，可多選</p>
    <div class="product-grid" style="max-height:400px;overflow-y:auto">${cards||'<div class="empty-state"><div class="icon">📦</div><p>尚無品項</p></div>'}</div>
    <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="addSelectedProducts()">加入選取品項</button></div>`);
}
function togglePicker(id){
  if(pickerSelected.has(id)){pickerSelected.delete(id);document.getElementById('pp-'+id)?.classList.remove('selected');document.getElementById('chk-'+id).textContent='';}
  else{pickerSelected.add(id);document.getElementById('pp-'+id)?.classList.add('selected');document.getElementById('chk-'+id).textContent='✓';}
}
function addSelectedProducts(){
  const q=getCurrentQuote();if(!q)return;
  pickerSelected.forEach(pid=>{const p=products.find(x=>x.id===pid);if(p)q.items.push({id:uid(),name:p.name,price:p.price,cost:p.cost||0,qty:1,unit:p.unit,note:p.note});});
  closeModal();renderEditor();toast(`已加入 ${pickerSelected.size} 個品項 ✓`,'success');
}

function renderDB(){
  const content=document.getElementById('main-content');
  const cards=products.map(p=>{
    const m=p.price>0?Math.round((p.price-(p.cost||0))/p.price*100):0;
    return `<div class="product-card" style="cursor:default">
      <div style="display:flex;align-items:flex-start;justify-content:space-between">
        <div style="flex:1;min-width:0">
          <div class="pc-name">${esc(p.name)}</div>
          <div style="display:flex;gap:12px;margin-top:6px;flex-wrap:wrap">
            <div><div style="font-size:10px;color:var(--muted);margin-bottom:2px">售價</div><div class="pc-price">NT$ ${fmt(p.price)} / ${esc(p.unit)}</div></div>
            <div><div style="font-size:10px;color:var(--muted);margin-bottom:2px">成本</div><div class="pc-cost">NT$ ${fmt(p.cost||0)}</div></div>
            <div><div style="font-size:10px;color:var(--muted);margin-bottom:2px">毛利</div><div class="pc-margin">NT$ ${fmt(p.price-(p.cost||0))} <span class="chip chip-${m>=40?'green':m>=20?'gold':'red'}">${m}%</span></div></div>
          </div>
          ${p.note?`<div style="margin-top:8px;font-size:12px;color:var(--text);white-space:pre-line;line-height:1.5">${esc(p.note)}</div>`:''}
        </div>
        <div style="display:flex;gap:4px;flex-shrink:0;margin-left:8px">
          <button class="btn btn-ghost btn-icon btn-sm" onclick="editProduct('${p.id}')">✏️</button>
          <button class="btn btn-ghost btn-icon btn-sm" onclick="deleteProduct('${p.id}')" style="color:var(--danger)">✕</button>
        </div>
      </div></div>`;
  }).join('');
  content.innerHTML=`<div class="card"><div class="card-header"><div class="card-title">📦 品項資料庫 <span class="badge">${products.length} 項</span></div></div>
    <p style="font-size:12px;color:var(--muted);margin-bottom:16px">管理常用品項及成本，報價單產出時僅顯示售價。</p>
    ${products.length?`<div class="product-grid">${cards}</div>`:`<div class="empty-state"><div class="icon">📦</div><p>尚無品項</p></div>`}</div>`;
}

function openAddProduct(id){
  const p=id?products.find(x=>x.id===id):null;
  openModal(`<h3>${p?'編輯品項':'新增品項'}</h3>
    <div style="display:flex;flex-direction:column;gap:12px;margin-top:14px">
      <div class="form-group"><label>品項名稱 *</label><input id="mp-name" value="${esc(p?.name||'')}" placeholder="例：LED 顯示幕租賃"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">
        <div class="form-group"><label>售價 (NT$)</label><input id="mp-price" type="number" value="${p?.price||0}" min="0"></div>
        <div class="form-group"><label>成本 (NT$)</label><input id="mp-cost" type="number" value="${p?.cost||0}" min="0"></div>
        <div class="form-group"><label>單位</label><input id="mp-unit" value="${esc(p?.unit||'式')}"></div>
      </div>
      <div id="mp-margin-preview" style="background:var(--surface2);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--muted)">填入售價與成本後自動計算毛利率</div>
      <div class="form-group"><label>備註</label><textarea id="mp-note" rows="3" placeholder="1. 第一項&#10;2. 第二項">${esc(p?.note||'')}</textarea></div>
    </div>
    <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="saveProduct('${id||''}')">${p?'儲存變更':'新增'}</button></div>`);
  setTimeout(()=>{
    const upd=()=>{
      const pr=parseFloat(document.getElementById('mp-price')?.value)||0;
      const co=parseFloat(document.getElementById('mp-cost')?.value)||0;
      const profit=pr-co;const m=pr>0?Math.round(profit/pr*100):0;
      const el=document.getElementById('mp-margin-preview');
      if(el)el.innerHTML=`毛利 <strong style="color:${profit>=0?'var(--success)':'var(--danger)'}">NT$ ${fmt(profit)}</strong>　毛利率 <strong style="color:${m>=30?'var(--success)':m>=15?'var(--gold)':'var(--danger)'}">${m}%</strong>`;
    };
    document.getElementById('mp-price')?.addEventListener('input',upd);
    document.getElementById('mp-cost')?.addEventListener('input',upd);
    if(p)upd();
  },0);
}
function editProduct(id){openAddProduct(id);}
function saveProduct(id){
  const name=document.getElementById('mp-name')?.value.trim();if(!name){toast('請輸入品項名稱','error');return;}
  const price=parseFloat(document.getElementById('mp-price')?.value)||0;
  const cost=parseFloat(document.getElementById('mp-cost')?.value)||0;
  const unit=document.getElementById('mp-unit')?.value.trim()||'式';
  const note=document.getElementById('mp-note')?.value.trim()||'';
  if(id){const p=products.find(x=>x.id===id);if(p)Object.assign(p,{name,price,cost,unit,note});}
  else products.push({id:uid(),name,price,cost,unit,note});
  saveProducts();closeModal();renderDB();toast('品項已儲存 ✓','success');
}
function deleteProduct(id){products=products.filter(p=>p.id!==id);saveProducts();renderDB();toast('品項已刪除');}

function renderProfit(){
  const content=document.getElementById('main-content');const q=getCurrentQuote();
  if(!q){content.innerHTML='<div class="empty-state"><div class="icon">📊</div><p>請先選擇報價單</p></div>';return;}
  collectFormData(q);
  const{revenue,totalCost,tax,revenueWithTax,profit,margin}=calcFinancials(q);
  const rows=q.items.map((item,i)=>{
    const rev=item.price*item.qty;const cost=(item.cost||0)*item.qty;const p=rev-cost;const m=rev>0?Math.round(p/rev*100):0;
    return `<tr><td>${i+1}. ${esc(item.name)||'—'}<br><span style="font-size:11px;color:var(--muted)">${esc(item.unit)} × ${item.qty}</span></td>
      <td class="pt-rev">NT$ ${fmt(rev)}</td><td class="pt-cost">NT$ ${fmt(cost)}</td>
      <td class="${p>=0?'pt-profit-pos':'pt-profit-neg'}">NT$ ${fmt(p)}</td>
      <td><span class="chip chip-${m>=40?'green':m>=20?'gold':'red'}">${m}%</span></td></tr>`;
  }).join('');
  const mc=margin>=40?'green':margin>=20?'gold':'red';
  content.innerHTML=`<div class="card">
    <div class="card-header"><div class="card-title">📊 利潤結算 — ${esc(q.projectName)||'（未命名）'}</div><div style="font-size:12px;color:var(--muted)">${q.qno} · ${q.date}</div></div>
    <div class="profit-kpi-grid">
      <div class="kpi-card"><div class="kpi-label">總售價（未稅）</div><div class="kpi-val gold">NT$ ${fmt(revenue)}</div></div>
      <div class="kpi-card"><div class="kpi-label">總成本</div><div class="kpi-val white">NT$ ${fmt(totalCost)}</div></div>
      <div class="kpi-card"><div class="kpi-label">毛利</div><div class="kpi-val ${profit>=0?'green':'red'}">NT$ ${fmt(profit)}</div></div>
      <div class="kpi-card"><div class="kpi-label">毛利率</div><div class="kpi-val ${mc}">${margin.toFixed(1)}%</div></div>
    </div>
    <table class="profit-table"><thead><tr><th>品項</th><th>售價小計</th><th>成本小計</th><th>毛利</th><th>毛利率</th></tr></thead><tbody>${rows}</tbody></table>
    <div style="margin-top:16px;border-top:1px solid var(--border);padding-top:16px;display:flex;flex-direction:column;align-items:flex-end;gap:8px">
      <div class="total-row"><span class="total-label">總售價（未稅）</span><span class="total-val">${fmt(revenue)}</span></div>
      <div class="total-row"><span class="total-label">營業稅 (5%)</span><span class="total-val">${fmt(tax)}</span></div>
      <div class="total-row"><span class="total-label">含稅總額</span><span class="total-val">${fmt(revenueWithTax)}</span></div>
      <div class="total-row grand"><span class="total-label">毛利</span><span class="total-val" style="color:${profit>=0?'var(--success)':'var(--danger)'}">NT$ ${fmt(profit)}</span></div>
    </div>
    <p style="font-size:11px;color:var(--muted);margin-top:12px">＊ 此頁面僅供內部參考，不會出現在客戶報價單中。</p>
  </div>`;
}

function renderSummary(){
  const content=document.getElementById('main-content');
  if(!quotes.length){content.innerHTML=`<div class="empty-state"><div class="icon">📊</div><p>尚無報價單紀錄</p><button class="btn btn-primary" style="margin-top:16px" onclick="newQuote()">＋ 新增第一份報價單</button></div>`;return;}
  const sorted=[...quotes].sort((a,b)=>b.date.localeCompare(a.date));
  let totalRevAll=0,totalCostAll=0;
  const maxRev=Math.max(...sorted.map(q=>calcFinancials(q).revenue),1);
  const rows=sorted.map(q=>{
    const{revenue,totalCost,revenueWithTax,profit,margin}=calcFinancials(q);
    totalRevAll+=revenue;totalCostAll+=totalCost;
    const barW=Math.round(revenue/maxRev*100);const mc=margin>=40?'green':margin>=20?'gold':'red';
    return `<tr style="cursor:pointer" onclick="loadQuote('${q.id}')">
      <td><span style="color:var(--accent2);font-weight:600;font-size:12px">${esc(q.qno)}</span></td>
      <td><div style="font-weight:500">${esc(q.projectName)||'（未命名）'}</div><div style="font-size:11px;color:var(--muted);margin-top:2px">${esc(q.clientName)||'—'}</div></td>

      <td class="r"><span class="chip chip-${mc}">${margin.toFixed(1)}%</span></td>
    </tr>`;
  }).join('');
  const totalProfit=totalRevAll-totalCostAll;const totalMargin=totalRevAll>0?totalProfit/totalRevAll*100:0;
  content.innerHTML=`<div class="card">
    <div class="card-header"><div class="card-title">📊 歷史報價單匯總 <span class="badge">${quotes.length} 份</span></div></div>
    <div class="profit-kpi-grid" style="margin-bottom:20px">
      <div class="kpi-card"><div class="kpi-label">總報價金額（含稅）</div><div class="kpi-val gold">NT$ ${fmt(totalRevAll+Math.round(totalRevAll*0.05))}</div></div>
      <div class="kpi-card"><div class="kpi-label">總成本</div><div class="kpi-val white">NT$ ${fmt(totalCostAll)}</div></div>
      <div class="kpi-card"><div class="kpi-label">累計毛利</div><div class="kpi-val ${totalProfit>=0?'green':'red'}">NT$ ${fmt(totalProfit)}</div></div>
      <div class="kpi-card"><div class="kpi-label">平均毛利率</div><div class="kpi-val ${totalMargin>=40?'green':totalMargin>=20?'gold':'red'}">${totalMargin.toFixed(1)}%</div></div>

    </div>
    <p style="font-size:11px;color:var(--muted);margin-top:12px">點擊任一列可切換至該報價單進行編輯。</p>
  </div>`;
}

async function downloadPDF(){
  const q=getCurrentQuote();if(!q){toast('請先選擇報價單','error');return;}
  collectFormData(q);saveQuotes();
  const btn=document.getElementById('btn-pdf');
  if(btn){btn.textContent='⏳ 產生中…';btn.disabled=true;}

  // 切換到預覽頁籤讓內容渲染到畫面
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-preview')?.classList.add('active');
  currentTab='preview'; renderPreview();
  await new Promise(r=>setTimeout(r,400));

  const element=document.getElementById('pdf-target');
  if(!element){toast('PDF 產生失敗','error');if(btn){btn.textContent='📥 下載 PDF';btn.disabled=false;}return;}

  try{
    const filename=`${q.qno}_${(q.projectName||'報價單').replace(/[\/\\:*?"<>|]/g,'')}.pdf`;
    await html2pdf().set({
      margin:0,
      filename,
      image:{type:'jpeg',quality:0.97},
      html2canvas:{
        scale:2,
        useCORS:true,
        backgroundColor:'#ffffff',
        logging:false,
        // ★ 關鍵修正：用 onclone 移除置中 margin，讓元素對齊左上角，解決左側被裁切問題
        onclone:(clonedDoc)=>{
          const el=clonedDoc.getElementById('pdf-target');
          if(el){
            el.style.margin='0';
            el.style.maxWidth='none';
            el.style.width='800px';
            el.style.boxShadow='none';
            el.style.borderRadius='0';
          }
        }
      },
      jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}
    }).from(element).save();
    toast('PDF 已下載 ✓','success');
  }catch(e){
    console.error(e);toast('PDF 產生失敗，請改用「列印」','error');
  }finally{
    if(btn){btn.textContent='📥 下載 PDF';btn.disabled=false;}
  }
}

function closeModal(){document.getElementById('modal').classList.remove('open');}
