<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>以太四象｜報價單平台</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
  :root {
    --bg: #0c0d10; --surface: #14161a; --surface2: #1c1f24;
    --border: #282c34; --accent: #ccb38c; --accent2: #ddc9a6;
    --text: #e6e3dc; --muted: #888480; --success: #5aab8f;
    --danger: #c97b7b; --gold: #ccb38c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', 'PingFang TC', 'Noto Sans TC', sans-serif; min-height: 100vh; }

  .app { display: flex; height: 100vh; overflow: hidden; }
  .sidebar { width: 260px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .content { flex: 1; overflow-y: auto; padding: 24px; }

  .logo { padding: 20px 16px; border-bottom: 1px solid var(--border); }
  .logo h1 { font-size: 16px; font-weight: 700; color: var(--accent2); letter-spacing: 1px; }
  .logo p { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .quote-list { padding: 8px; flex: 1; overflow-y: auto; }
  .quote-list-item { padding: 10px 12px; border-radius: 8px; cursor: pointer; margin-bottom: 4px; border: 1px solid transparent; transition: all 0.15s; }
  .quote-list-item:hover { background: var(--surface2); }
  .quote-list-item.active { border-color: var(--accent); background: rgba(204,179,140,0.08); }
  .quote-list-item .qno { font-size: 12px; font-weight: 600; color: var(--accent2); }
  .quote-list-item .qname { font-size: 12px; color: var(--text); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .quote-list-item .qdate { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .sidebar-actions { padding: 12px; border-top: 1px solid var(--border); display: flex; gap: 8px; }

  .topbar { height: 56px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; gap: 12px; }
  .topbar h2 { font-size: 15px; font-weight: 600; flex: 1; }
  .tabs { display: flex; gap: 4px; background: var(--bg); border-radius: 8px; padding: 4px; }
  .tab { padding: 6px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; color: var(--muted); transition: all 0.15s; border: none; background: none; }
  .tab.active { background: var(--accent); color: #0c0d10; font-weight: 600; }

  .btn { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px; }
  .btn-primary { background: var(--accent); color: #0c0d10; font-weight: 600; }
  .btn-primary:hover { background: var(--accent2); }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); }
  .btn-success { background: var(--success); color: #fff; font-weight: 600; }
  .btn-success:hover { opacity: 0.85; }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-sm { padding: 6px 12px; font-size: 12px; }
  .btn-full { width: 100%; justify-content: center; }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }
  .form-group label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .form-group input, .form-group select, .form-group textarea {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); padding: 9px 12px; font-size: 13px; font-family: inherit; outline: none; transition: border-color 0.15s;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); }
  .form-group textarea { resize: vertical; min-height: 60px; }
  .form-group select option { background: var(--surface2); }

  .section-header { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px;
    padding: 16px 0 8px; border-bottom: 1px solid var(--border); margin-bottom: 16px; grid-column: 1 / -1; }

  .items-table { grid-column: 1 / -1; }
  .item-row { display: grid; grid-template-columns: 1fr 80px 60px 60px 60px 32px; gap: 8px; align-items: start; margin-bottom: 8px; }
  .item-row-header { display: grid; grid-template-columns: 1fr 80px 60px 60px 60px 32px; gap: 8px; margin-bottom: 6px; }
  .item-row-header span { font-size: 10px; color: var(--muted); font-weight: 600; text-transform: uppercase; }
  .item-note { grid-column: 1 / -1; margin-top: -4px; margin-bottom: 8px; }
  .btn-icon { width: 32px; height: 36px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--danger); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; }
  .btn-icon:hover { background: rgba(201,123,123,0.1); }

  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 16px; color: var(--muted); }
  .empty-state .icon { font-size: 48px; }
  .empty-state p { font-size: 14px; }

  .toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; border-radius: 10px; font-size: 13px; font-weight: 500;
    z-index: 9999; animation: slideIn 0.2s ease; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
  .toast.success { background: var(--success); color: #fff; }
  .toast.error { background: var(--danger); color: #fff; }
  .toast.info { background: var(--accent); color: #0c0d10; }
  @keyframes slideIn { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .sync-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--success); }
  .sync-dot.offline { background: var(--danger); }
  .sync-dot.loading { background: var(--accent); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* Preview styles */
  .preview-wrap {
    background: #fff; color: #111; width: 800px; margin: 0 auto;
    padding: 40px 44px; box-shadow: 0 4px 40px rgba(0,0,0,0.5);
    border-radius: 4px; font-family: 'PingFang TC', 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
  }
  .pv-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; }
  .pv-brand strong { display: block; font-size: 16px; color: #111; font-weight: 700; letter-spacing: 2px; }
  .pv-brand span { display: block; font-size: 11px; color: #888; letter-spacing: 1px; margin-top: 3px; }
  .pv-title { font-size: 24px; font-weight: 800; letter-spacing: 6px; color: #222; }
  .pv-sections { display: grid; grid-template-columns: 1fr 1fr; border: 1px solid #ddd; }
  .pv-section { padding: 12px 16px; }
  .pv-section:first-child { border-right: 1px solid #ddd; }
  .pv-section-title { font-size: 9px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 7px; border-bottom: 1px solid #eee; padding-bottom: 4px; }
  .pv-field { display: flex; font-size: 11px; margin-bottom: 4px; }
  .pv-field-label { color: #888; min-width: 56px; flex-shrink: 0; }
  .pv-field-val { font-weight: 500; }
  .pv-terms { border: 1px solid #ddd; border-top: none; padding: 10px 16px; }
  .pv-terms-title { font-size: 9px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; border-bottom: 1px solid #eee; padding-bottom: 4px; }
  .pv-term { display: flex; font-size: 10.5px; margin-bottom: 4px; line-height: 1.5; }
  .pv-term-label { color: #888; min-width: 56px; flex-shrink: 0; }
  .pv-term-val { color: #333; }
  .pv-section-title-row { font-size: 9px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 1px; border: 1px solid #ddd; border-top: none; padding: 8px 16px 4px; }
  .pv-items { border: 1px solid #ddd; border-top: none; }
  .pv-items-header { display: grid; grid-template-columns: 32px 1fr 80px 50px 40px 80px; background: #f5f5f5; padding: 6px 10px; font-size: 10px; font-weight: 700; color: #555; }
  .pv-item-row { display: grid; grid-template-columns: 32px 1fr 80px 50px 40px 80px; padding: 8px 10px; border-top: 1px solid #eee; font-size: 11px; align-items: start; }
  .pv-num { text-align: center; color: #888; font-size: 10px; padding-top: 1px; }
  .pv-money { text-align: right; }
  .pv-totals { border: 1px solid #ddd; border-top: none; padding: 10px 16px; }
  .pv-total-row { display: flex; justify-content: flex-end; gap: 40px; font-size: 12px; margin-bottom: 4px; }
  .pv-total-label { color: #888; min-width: 70px; text-align: right; }
  .pv-total-val { min-width: 90px; text-align: right; font-weight: 500; }
  .grand-row { font-size: 14px; font-weight: 700; border-top: 1px solid #ddd; padding-top: 8px; margin-top: 4px; }
  .pv-footer { border: 1px solid #ddd; border-top: none; display: grid; grid-template-columns: 1fr 1fr; }
  .pv-bank { padding: 12px 16px; border-right: 1px solid #ddd; }
  .pv-bank-title { font-size: 9px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .pv-bank p { font-size: 11px; margin-bottom: 3px; color: #333; }
  .pv-sig { padding: 12px 16px; }
  .pv-sig-title { font-size: 9px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .pv-sig-line { margin-top: 36px; border-top: 1px solid #bbb; padding-top: 6px; font-size: 10px; color: #999; text-align: center; }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="logo">
      <h1>以太四象</h1>
      <p>報價單管理平台</p>
    </div>
    <div class="quote-list" id="quote-list">
      <div style="padding:20px;text-align:center;color:var(--muted);font-size:13px">
        <div class="sync-dot loading" style="display:inline-block;margin-right:6px"></div>連線中…
      </div>
    </div>
    <div class="sidebar-actions">
      <button class="btn btn-primary btn-full" onclick="newQuote()">＋ 新增報價單</button>
    </div>
  </div>
  <div class="main">
    <div class="topbar">
      <h2 id="topbar-title">請選擇或建立報價單</h2>
      <div id="sync-status" class="sync-badge"><div class="sync-dot loading"></div><span>連線中</span></div>
      <div class="tabs">
        <button class="tab active" id="tab-form" onclick="switchTab('form')">表單</button>
        <button class="tab" id="tab-preview" onclick="switchTab('preview')">預覽</button>
        <button class="tab" id="tab-terms" onclick="switchTab('terms')">條款</button>
      </div>
      <div id="topbar-actions"></div>
    </div>
    <div class="content" id="main-content">
      <div class="empty-state">
        <div class="icon">📄</div>
        <p>請先選擇或建立報價單</p>
      </div>
    </div>
  </div>
</div>

<script>
// ─── Firebase 初始化 ───────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyC2ztlrDI_sNkkZbe3CEdvO8G_BLsTujHk",
  authDomain: "aether-quotation.firebaseapp.com",
  projectId: "aether-quotation",
  storageBucket: "aether-quotation.firebasestorage.app",
  messagingSenderId: "670135588708",
  appId: "1:670135588708:web:aeaee7812d7860c9908c71"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ─── 常數 ───────────────────────────────────────────
const COMPANY = { name:'以太四象有限公司', bank:'玉山銀行 (808)', account:'1230940028928', holder:'以太四象有限公司' };
const SALESPERSONS = ['蘇柏屹 Bryan','黃雨晴 Eden','王亞昀 Amber'];
const TERMS = {
  confirm:'此報價單具合約效力，本報價單經簽章傳回後，即為正式合作約定，不可要求全額退款。若因個人因素需中止專案，除訂金全額不予退回外，需另外支付已產生之費用。',
  payment:'專案訂金：回簽報價單時支付60%；專案尾款：活動結束後翌日支付40%。',
  deadline:'訂金請於收到發票後3日內支付，收到訂金後方可啟動專案。剩餘期數款項請於收到發票後7日內完成匯款支付。若未依約定期程付款，我方有權逕行停止作品之展示與使用，取回產品、設備之所有權。',
  warranty:'非人損、天災範圍，對報價內容提供保固維護。',
  extra:'敬請詳閱報價備註欄中所載之注意事項。如報價單中未詳盡之事項，需另訂定合約，雙方需事先議定。'
};

// ─── 狀態 ───────────────────────────────────────────
let quotes = [];
let currentQuoteId = null;
let currentTab = 'form';

// ─── 工具函式 ────────────────────────────────────────
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function today(){ return new Date().toISOString().slice(0,10); }
function daysLater(n){ const d=new Date(); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); }
function fmt(n){ return Number(n||0).toLocaleString(); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escHTML(s){ return esc(s); }
function g(id){ const el=document.getElementById(id); return el?el.value.trim():''; }

function nextQno(){
  const yr = new Date().getFullYear();
  const existing = quotes.filter(q=>q.qno&&q.qno.startsWith(`QT-${yr}-`));
  let max = 0;
  existing.forEach(q=>{ const n=parseInt(q.qno.split('-')[2]||0); if(n>max)max=n; });
  return `QT-${yr}-${String(max+1).padStart(3,'0')}`;
}

function toast(msg, type='info'){
  const t=document.createElement('div');
  t.className=`toast ${type}`; t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2800);
}

function setSyncStatus(state){
  const el=document.getElementById('sync-status');
  if(!el)return;
  const dot=el.querySelector('.sync-dot');
  const lbl=el.querySelector('span');
  dot.className='sync-dot'+(state==='online'?'':state==='loading'?' loading':' offline');
  lbl.textContent=state==='online'?'已同步':state==='loading'?'連線中':'離線';
}

// ─── Firebase 即時監聽 ────────────────────────────────
db.collection('quotes').orderBy('createdAt','desc').onSnapshot(snapshot=>{
  quotes = snapshot.docs.map(doc=>({id:doc.id, ...doc.data()}));
  renderSidebar();
  setSyncStatus('online');
  // 如果目前選的報價單還存在，重新渲染
  if(currentQuoteId){
    const still = quotes.find(q=>q.id===currentQuoteId);
    if(still){ renderCurrentTab(); }
    else { currentQuoteId=null; renderEmpty(); }
  }
}, err=>{
  console.error(err);
  setSyncStatus('offline');
  toast('無法連線至資料庫','error');
});

// ─── 資料操作 ─────────────────────────────────────────
async function saveToFirestore(q){
  try{
    // Firestore 不支援 undefined 值，先清理
    const clean = JSON.parse(JSON.stringify(q));
    await db.collection('quotes').doc(q.id).set(clean);
    setSyncStatus('online');
  }catch(e){
    console.error(e);
    toast('儲存失敗：'+e.message,'error');
    setSyncStatus('offline');
  }
}

async function deleteFromFirestore(id){
  try{
    await db.collection('quotes').doc(id).delete();
  }catch(e){
    console.error(e);
    toast('刪除失敗：'+e.message,'error');
  }
}

// ─── 報價單結構 ───────────────────────────────────────
function newBlankQuote(){
  return {
    id:uid(), qno:nextQno(), date:today(), validDate:daysLater(14),
    projectName:'', projectNote:'', salesperson:SALESPERSONS[0], salespersonPhone:'',
    clientName:'', clientContact:'', clientPhone:'', clientAddress:'',
    items:[{id:uid(),name:'',price:0,cost:0,qty:1,unit:'式',note:''}],
    terms:{...TERMS}, createdAt:new Date().toISOString()
  };
}

function getCurrentQuote(){ return quotes.find(q=>q.id===currentQuoteId)||null; }

function calcFinancials(q){
  const revenue = q.items.reduce((s,i)=>s+(Number(i.price)||0)*(Number(i.qty)||0),0);
  const tax = Math.round(revenue*0.05);
  return {revenue, tax, revenueWithTax:revenue+tax};
}

// ─── 收集表單資料 ─────────────────────────────────────
function collectFormData(q){
  if(!document.getElementById('f-qno'))return;
  q.qno=g('f-qno'); q.date=g('f-date'); q.validDate=g('f-validDate');
  q.salesperson=g('f-salesperson'); q.salespersonPhone=g('f-salespersonPhone');
  q.projectName=g('f-projectName'); q.projectNote=g('f-projectNote');
  q.clientName=g('f-clientName'); q.clientContact=g('f-clientContact');
  q.clientPhone=g('f-clientPhone'); q.clientAddress=g('f-clientAddress');
  q.items=q.items.map((item,i)=>{
    const name=g('i-name-'+i)||''; const price=Number(g('i-price-'+i))||0;
    const cost=Number(g('i-cost-'+i))||0; const qty=Number(g('i-qty-'+i))||1;
    const unit=g('i-unit-'+i)||'式'; const note=g('i-note-'+i)||'';
    return {...item,name,price,cost,qty,unit,note};
  });
}
function collectTerms(q){
  if(!document.getElementById('f-t-confirm'))return;
  q.terms.confirm=g('f-t-confirm'); q.terms.payment=g('f-t-payment');
  q.terms.deadline=g('f-t-deadline'); q.terms.warranty=g('f-t-warranty');
  q.terms.extra=g('f-t-extra');
}

// ─── UI 操作 ──────────────────────────────────────────
function newQuote(){
  const q=newBlankQuote();
  quotes.unshift(q);
  currentQuoteId=q.id;
  saveToFirestore(q);
  renderSidebar();
  switchTab('form');
  renderForm();
  updateTopbar();
}

async function saveCurrentQuote(){
  const q=getCurrentQuote(); if(!q){toast('請先選擇報價單','error');return;}
  collectFormData(q); collectTerms(q);
  await saveToFirestore(q);
  renderSidebar();
  toast('已儲存 ✓','success');
}

async function deleteCurrentQuote(){
  const q=getCurrentQuote(); if(!q)return;
  if(!confirm(`確定要刪除「${q.qno}」？`))return;
  const id=q.id;
  currentQuoteId=null;
  await deleteFromFirestore(id);
  renderEmpty();
  updateTopbar();
  toast('已刪除','info');
}

function selectQuote(id){
  const q=quotes.find(x=>x.id===id); if(!q)return;
  currentQuoteId=id;
  renderSidebar();
  renderCurrentTab();
  updateTopbar();
}

function switchTab(tab){
  const q=getCurrentQuote();
  if(q){
    if(currentTab==='form')collectFormData(q);
    if(currentTab==='terms')collectTerms(q);
  }
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+tab)?.classList.add('active');
  renderCurrentTab();
}

function renderCurrentTab(){
  if(currentTab==='form')renderForm();
  else if(currentTab==='preview')renderPreview();
  else if(currentTab==='terms')renderTerms();
}

function renderEmpty(){
  document.getElementById('main-content').innerHTML='<div class="empty-state"><div class="icon">📄</div><p>請先選擇或建立報價單</p></div>';
}

function updateTopbar(){
  const q=getCurrentQuote();
  const title=document.getElementById('topbar-title');
  const actions=document.getElementById('topbar-actions');
  if(!q){ title.textContent='請選擇或建立報價單'; actions.innerHTML=''; return; }
  title.textContent=`${q.qno}　${q.projectName||'（未命名）'}`;
  actions.innerHTML=`
    <button class="btn btn-ghost btn-sm" onclick="deleteCurrentQuote()">🗑 刪除</button>
    <button class="btn btn-success btn-sm" onclick="saveCurrentQuote()">💾 儲存</button>
    <button class="btn btn-ghost btn-sm" onclick="printQuote()">🖨 列印</button>
    <button class="btn btn-primary btn-sm" id="btn-pdf" onclick="downloadPDF()">📥 下載 PDF</button>`;
}

// ─── 側邊欄 ───────────────────────────────────────────
function renderSidebar(){
  const list=document.getElementById('quote-list');
  if(quotes.length===0){
    list.innerHTML='<div style="padding:20px;text-align:center;color:var(--muted);font-size:12px">尚無報價單</div>';
    return;
  }
  list.innerHTML=quotes.map(q=>`
    <div class="quote-list-item${q.id===currentQuoteId?' active':''}" onclick="selectQuote('${q.id}')">
      <div class="qno">${esc(q.qno)}</div>
      <div class="qname">${esc(q.projectName||'（未命名）')}</div>
      <div class="qdate">${q.date||''} · ${esc(q.salesperson||'')}</div>
    </div>`).join('');
}

// ─── 表單渲染 ─────────────────────────────────────────
function renderForm(){
  const q=getCurrentQuote();
  if(!q){renderEmpty();return;}
  const itemRows=q.items.map((item,i)=>`
    <div class="item-row">

function renderFinSummary(q){
  const el=document.getElementById('fin-summary'); if(!el)return;
  const{revenue,tax,revenueWithTax}=calcFinancials(q);
  el.innerHTML=`<div style="display:flex;gap:24px;font-size:13px">
    <span style="color:var(--muted)">小計 <strong style="color:var(--text)">NT$ ${fmt(revenue)}</strong></span>
    <span style="color:var(--muted)">稅 <strong style="color:var(--text)">NT$ ${fmt(tax)}</strong></span>
    <span style="color:var(--accent2);font-weight:700;font-size:15px">總計 NT$ ${fmt(revenueWithTax)}</span>
  </div>`;
}

function syncItem(){
  const q=getCurrentQuote(); if(!q)return;
  collectFormData(q);
  renderFinSummary(q);
}

function addItem(){
  const q=getCurrentQuote(); if(!q)return;
  collectFormData(q);
  q.items.push({id:uid(),name:'',price:0,cost:0,qty:1,unit:'式',note:''});
  renderForm();
}

function removeItem(i){
  const q=getCurrentQuote(); if(!q)return;
  collectFormData(q);
  if(q.items.length<=1){toast('至少保留一個項目','error');return;}
  q.items.splice(i,1);
  renderForm();
}

// ─── PDF 下載 ─────────────────────────────────────────
async function downloadPDF(){
  const q=getCurrentQuote(); if(!q){toast('請先選擇報價單','error');return;}
  collectFormData(q); saveToFirestore(q);
  const btn=document.getElementById('btn-pdf');
  if(btn){btn.textContent='⏳ 產生中…';btn.disabled=true;}

  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-preview')?.classList.add('active');
  currentTab='preview'; renderPreview();
  await new Promise(r=>setTimeout(r,400));

  const element=document.getElementById('pdf-target');
  if(!element){toast('PDF 產生失敗','error');if(btn){btn.textContent='📥 下載 PDF';btn.disabled=false;}return;}

  try{
    const filename=`${q.qno}_${(q.projectName||'報價單').replace(/[\/\\:*?"<>|]/g,'')}.pdf`;
    await html2pdf().set({
      margin:0,
      filename,
      image:{type:'jpeg',quality:0.97},
      html2canvas:{
        scale:2, useCORS:true, backgroundColor:'#ffffff', logging:false,
        onclone:(clonedDoc)=>{
          const el=clonedDoc.getElementById('pdf-target');
          if(el){ el.style.margin='0'; el.style.maxWidth='none'; el.style.width='800px'; el.style.boxShadow='none'; el.style.borderRadius='0'; }
        }
      },
      jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}
    }).from(element).save();
    toast('PDF 已下載 ✓','success');
  }catch(e){
    console.error(e); toast('PDF 產生失敗，請改用「列印」','error');
  }finally{
    if(btn){btn.textContent='📥 下載 PDF';btn.disabled=false;}
  }
}
</script>
</body>
</html>
