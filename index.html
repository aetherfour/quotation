<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>以太四象｜報價單平台</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
:root{--bg:#0c0d10;--surface:#14161a;--surface2:#1c1f24;--border:#282c34;--accent:#ccb38c;--accent2:#ddc9a6;--text:#e6e3dc;--muted:#888480;--success:#5aab8f;--danger:#c97b7b;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI','PingFang TC','Noto Sans TC',sans-serif;min-height:100vh;}
.app{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:240px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.logo{padding:18px 16px 14px;border-bottom:1px solid var(--border);}
.logo h1{font-size:15px;font-weight:700;color:var(--accent2);letter-spacing:1px;}
.logo p{font-size:11px;color:var(--muted);margin-top:2px;}
.nav-section{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;padding:14px 16px 6px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--muted);transition:all .15s;margin:1px 8px;}
.nav-item:hover{background:var(--surface2);color:var(--text);}
.nav-item.active{background:rgba(204,179,140,.12);color:var(--accent2);font-weight:600;}
.nav-item .icon{font-size:15px;width:18px;text-align:center;}
.history-list{flex:1;overflow-y:auto;padding:4px 8px 8px;}
.history-item{padding:9px 10px;border-radius:8px;cursor:pointer;margin-bottom:3px;border:1px solid transparent;transition:all .15s;}
.history-item:hover{background:var(--surface2);}
.history-item.active{border-color:var(--accent);background:rgba(204,179,140,.08);}
.history-item .h-qno{font-size:11px;font-weight:600;color:var(--accent2);}
.history-item .h-name{font-size:12px;color:var(--text);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.history-item .h-date{font-size:10px;color:var(--muted);margin-top:1px;}
.sidebar-bottom{padding:12px;border-top:1px solid var(--border);}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{height:54px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 22px;gap:10px;flex-shrink:0;}
.topbar-title{font-size:15px;font-weight:600;flex:1;}
.content{flex:1;overflow-y:auto;padding:24px;}
.btn{padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:5px;}
.btn-primary{background:var(--accent);color:#0c0d10;font-weight:600;}
.btn-primary:hover{background:var(--accent2);}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);}
.btn-ghost:hover{background:var(--surface2);color:var(--text);}
.btn-success{background:var(--success);color:#fff;font-weight:600;}
.btn-success:hover{opacity:.85;}
.btn-sm{padding:5px 11px;font-size:12px;}
.btn-full{width:100%;justify-content:center;}
.tabs{display:flex;gap:3px;background:var(--bg);border-radius:8px;padding:3px;}
.tab{padding:5px 14px;border-radius:6px;cursor:pointer;font-size:12px;color:var(--muted);border:none;background:none;transition:all .15s;}
.tab.active{background:var(--accent);color:#0c0d10;font-weight:600;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-group.full{grid-column:1/-1;}
.form-group label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
.form-group input,.form-group select,.form-group textarea{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:8px 11px;font-size:13px;font-family:inherit;outline:none;transition:border-color .15s;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent);}
.form-group textarea{resize:vertical;min-height:56px;}
.form-group select option{background:var(--surface2);}
.section-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px;margin-bottom:16px;}
.section-card-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.items-table-wrap{overflow-x:auto;}
.items-table{width:100%;border-collapse:collapse;}
.items-table th{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:7px 8px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap;}
.items-table th.r{text-align:right;}
.items-table td{padding:6px 8px;border-bottom:1px solid rgba(40,44,52,.6);vertical-align:middle;}
.item-input{background:var(--surface2);border:1px solid transparent;border-radius:6px;color:var(--text);padding:6px 8px;font-size:13px;font-family:inherit;outline:none;width:100%;transition:border-color .15s;}
.item-input:focus{border-color:var(--accent);}
.item-input.r{text-align:right;}
.items-totals{display:flex;flex-direction:column;align-items:flex-end;gap:4px;padding:10px 8px 0;border-top:1px solid var(--border);margin-top:4px;}
.total-row{display:flex;gap:16px;font-size:12px;}
.total-row .tl{color:var(--muted);min-width:90px;text-align:right;}
.total-row .tv{min-width:80px;text-align:right;font-weight:500;}
.total-row.grand{font-size:14px;font-weight:700;border-top:1px solid var(--border);padding-top:6px;margin-top:2px;}
.total-row.grand .tv{color:var(--accent2);}
.btn-icon{width:28px;height:28px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--danger);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.btn-icon:hover{background:rgba(201,123,123,.1);}
.profit-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 18px;}
.stat-card .s-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.stat-card .s-val{font-size:20px;font-weight:700;}
.stat-card .s-val.green{color:var(--success);}
.stat-card .s-val.gold{color:var(--accent2);}
.stat-card .s-val.red{color:var(--danger);}
.profit-items-table{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.profit-items-table table{width:100%;border-collapse:collapse;}
.profit-items-table th{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:10px 14px;border-bottom:1px solid var(--border);text-align:left;}
.profit-items-table th.r{text-align:right;}
.profit-items-table td{padding:10px 14px;border-bottom:1px solid rgba(40,44,52,.5);font-size:12px;}
.profit-items-table tr:last-child td{border-bottom:none;}
.profit-items-table td.r{text-align:right;}
.margin-badge{display:inline-block;padding:2px 7px;border-radius:12px;font-size:11px;font-weight:600;}
.margin-badge.good{background:rgba(90,171,143,.15);color:var(--success);}
.margin-badge.warn{background:rgba(201,123,123,.15);color:var(--danger);}
.items-library-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
.lib-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;position:relative;transition:border-color .15s;}
.lib-card:hover{border-color:rgba(204,179,140,.4);}
.lib-card .lc-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:10px;padding-right:56px;}
.lib-card .lc-row{display:flex;gap:18px;margin-bottom:6px;}
.lib-card .lc-field{display:flex;flex-direction:column;gap:2px;}
.lib-card .lc-field .lf-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
.lib-card .lc-field .lf-val{font-size:13px;font-weight:500;}
.lib-card .lc-profit{display:flex;align-items:center;gap:8px;margin-top:8px;}
.lib-card .lc-profit .lp-val{font-size:13px;font-weight:600;color:var(--success);}
.lib-card .lc-note{font-size:11px;color:var(--muted);margin-top:8px;line-height:1.5;white-space:pre-line;}
.lib-card .lc-actions{position:absolute;top:12px;right:12px;display:flex;gap:6px;}
.lib-card .lc-btn{width:26px;height:26px;border-radius:5px;border:1px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .15s;}
.lib-card .lc-btn.edit{color:var(--accent);}
.lib-card .lc-btn.edit:hover{background:rgba(204,179,140,.1);}
.lib-card .lc-btn.del{color:var(--danger);}
.lib-card .lc-btn.del:hover{background:rgba(201,123,123,.1);}
.summary-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
.summary-table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.summary-table-wrap h3{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.summary-table{width:100%;border-collapse:collapse;}
.summary-table th{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:10px 16px;border-bottom:1px solid var(--border);text-align:left;}
.summary-table th.r{text-align:right;}
.summary-table td{padding:11px 16px;border-bottom:1px solid rgba(40,44,52,.5);font-size:12px;cursor:pointer;}
.summary-table tr:hover td{background:var(--surface2);}
.summary-table tr:last-child td{border-bottom:none;}
.summary-table td.r{text-align:right;}
.badge-count{background:rgba(204,179,140,.15);color:var(--accent2);font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;}
/* Settings */
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.img-upload-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;display:flex;flex-direction:column;gap:14px;}
.img-upload-card h3{font-size:13px;font-weight:700;color:var(--text);}
.img-upload-card p{font-size:12px;color:var(--muted);line-height:1.5;}
.img-preview-box{width:100%;min-height:80px;background:var(--surface2);border:1px dashed var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}
.img-preview-box img{max-width:100%;max-height:100px;object-fit:contain;}
.img-preview-box .empty-hint{font-size:11px;color:var(--muted);}
.upload-btn-wrap{position:relative;}
.upload-btn-wrap input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:26px;width:440px;max-width:92vw;max-height:80vh;display:flex;flex-direction:column;}
.modal h3{font-size:15px;font-weight:700;color:var(--accent2);margin-bottom:16px;}
.modal-body{flex:1;overflow-y:auto;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;flex-shrink:0;}
.modal-form{display:flex;flex-direction:column;gap:12px;}
.modal-form .mf-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.modal-form label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;display:block;}
.modal-form input,.modal-form textarea{background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);padding:8px 10px;font-size:13px;font-family:inherit;outline:none;width:100%;transition:border-color .15s;}
.modal-form input:focus,.modal-form textarea:focus{border-color:var(--accent);}
.modal-form textarea{resize:vertical;min-height:54px;}
.profit-preview{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-top:4px;display:flex;gap:16px;}
.pp-item{display:flex;flex-direction:column;gap:2px;}
.pp-item .pp-label{font-size:9px;color:var(--muted);text-transform:uppercase;}
.pp-item .pp-val{font-size:14px;font-weight:700;}
.pp-item .pp-val.green{color:var(--success);}
.lib-select-list{display:flex;flex-direction:column;gap:8px;max-height:55vh;overflow-y:auto;}
.lib-select-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:8px;border:1px solid var(--border);cursor:pointer;transition:all .15s;}
.lib-select-item:hover,.lib-select-item.sel{border-color:var(--accent);background:rgba(204,179,140,.06);}
.lib-select-item .lsi-name{flex:1;font-size:13px;font-weight:500;}
.lib-select-item .lsi-price{font-size:12px;color:var(--accent2);}
.lib-select-item .lsi-unit{font-size:11px;color:var(--muted);}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px;color:var(--muted);}
.empty-state .icon{font-size:48px;}
.toast{position:fixed;bottom:24px;right:24px;padding:11px 18px;border-radius:10px;font-size:13px;font-weight:500;z-index:9999;animation:slideIn .2s ease;box-shadow:0 4px 20px rgba(0,0,0,.4);}
.toast.success{background:var(--success);color:#fff;}
.toast.error{background:var(--danger);color:#fff;}
.toast.info{background:var(--accent);color:#0c0d10;}
@keyframes slideIn{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
.sync-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--success);}
.sync-dot.offline{background:var(--danger);}
.sync-dot.loading{background:var(--accent);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
/* Preview */
.preview-wrap{background:#fff;color:#111;width:800px;margin:0 auto;padding:40px 44px;box-shadow:0 4px 40px rgba(0,0,0,.5);border-radius:4px;font-family:'PingFang TC','Noto Sans TC','Microsoft JhengHei',sans-serif;}
.pv-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;}
.pv-brand strong{display:block;font-size:16px;color:#111;font-weight:700;letter-spacing:2px;}
.pv-brand span{display:block;font-size:11px;color:#888;letter-spacing:1px;margin-top:3px;}
.pv-title{font-size:24px;font-weight:800;letter-spacing:6px;color:#222;}
.pv-sections{display:grid;grid-template-columns:1fr 1fr;border:1px solid #ddd;}
.pv-section{padding:12px 16px;}
.pv-section:first-child{border-right:1px solid #ddd;}
.pv-section-title{font-size:9px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:7px;border-bottom:1px solid #eee;padding-bottom:4px;}
.pv-field{display:flex;font-size:11px;margin-bottom:4px;}
.pv-field-label{color:#888;min-width:56px;flex-shrink:0;}
.pv-field-val{font-weight:500;}
.pv-terms{border:1px solid #ddd;border-top:none;padding:10px 16px;}
.pv-terms-title{font-size:9px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;border-bottom:1px solid #eee;padding-bottom:4px;}
.pv-term{display:flex;font-size:10.5px;margin-bottom:4px;line-height:1.5;}
.pv-term-label{color:#888;min-width:56px;flex-shrink:0;}
.pv-term-val{color:#333;}
.pv-section-title-row{font-size:9px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:1px;border:1px solid #ddd;border-top:none;padding:8px 16px 4px;}
.pv-items{border:1px solid #ddd;border-top:none;}
.pv-items-header{display:grid;grid-template-columns:32px 1fr 80px 50px 40px 80px;background:#f5f5f5;padding:6px 10px;font-size:10px;font-weight:700;color:#555;}
.pv-item-row{display:grid;grid-template-columns:32px 1fr 80px 50px 40px 80px;padding:8px 10px;border-top:1px solid #eee;font-size:11px;align-items:start;}
.pv-num{text-align:center;color:#888;font-size:10px;padding-top:1px;}
.pv-money{text-align:right;}
.pv-totals{border:1px solid #ddd;border-top:none;padding:10px 16px;}
.pv-total-row{display:flex;justify-content:flex-end;gap:40px;font-size:12px;margin-bottom:4px;}
.pv-total-label{color:#888;min-width:70px;text-align:right;}
.pv-total-val{min-width:90px;text-align:right;font-weight:500;}
.grand-row{font-size:14px;font-weight:700;border-top:1px solid #ddd;padding-top:8px;margin-top:4px;}
.pv-footer{border:1px solid #ddd;border-top:none;display:grid;grid-template-columns:1fr 1fr;}
.pv-bank{padding:12px 16px;border-right:1px solid #ddd;display:flex;gap:14px;align-items:flex-start;}
.pv-bank-info{flex:1;}
.pv-bank-title{font-size:9px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
.pv-bank p{font-size:11px;margin-bottom:3px;color:#333;}
.pv-stamp{width:80px;height:80px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.pv-stamp img{width:80px;height:80px;object-fit:contain;opacity:.88;}
.pv-sig{padding:12px 16px;}
.pv-sig-title{font-size:9px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
.pv-sig-line{margin-top:36px;border-top:1px solid #bbb;padding-top:6px;font-size:10px;color:#999;text-align:center;}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="logo"><h1>以太四象</h1><p>報價單管理平台</p></div>
    <div class="nav-section">功能</div>
    <div class="nav-item active" id="nav-quotes" onclick="navigateTo('quotes')"><span class="icon">📄</span>編輯報價單</div>
    <div class="nav-item" id="nav-library" onclick="navigateTo('library')"><span class="icon">📦</span>品項資料庫</div>
    <div class="nav-item" id="nav-summary" onclick="navigateTo('summary')"><span class="icon">📊</span>匯總報表</div>
    <div class="nav-item" id="nav-settings" onclick="navigateTo('settings')"><span class="icon">⚙️</span>平台設定</div>
    <div class="nav-section">歷史紀錄</div>
    <div class="history-list" id="history-list"><div style="padding:12px;text-align:center;color:var(--muted);font-size:12px"><div class="sync-dot loading" style="display:inline-block;margin-right:5px"></div>連線中</div></div>
    <div class="sidebar-bottom">
      <button class="btn btn-primary btn-full btn-sm" onclick="newQuote()">＋ 新增報價單</button>
    </div>
  </div>
  <div class="main">
    <div class="topbar" id="topbar">
      <span class="topbar-title" id="topbar-title">以太四象報價單平台</span>

    </div>
    <div class="content" id="main-content">
      <div class="empty-state"><div class="icon">📄</div><p>請選擇或建立報價單</p></div>
    </div>
  </div>
</div>
<script>

  warranty:'非人損、天災範圍，對報價內容提供保固維護。',
  extra:'敬請詳閱報價備註欄中所載之注意事項。如報價單中未詳盡之事項，需另訂定合約，雙方需事先議定。'
};

// ── State ─────────────────────────────────────────────
let quotes=[], libItems=[], currentQuoteId=null, currentTab='form', currentView='quotes';
const DEFAULT_SETTINGS={logo:'./logo.png', stamp:'./stamp.png'};
let settings={...DEFAULT_SETTINGS};

// ── Load settings from localStorage ──────────────────
function loadSettings(){
  try{
    const raw=localStorage.getItem('aether_settings');
    if(raw){
      const saved=JSON.parse(raw);
      // Merge: saved values override defaults, but missing keys fall back to defaults
      settings={...DEFAULT_SETTINGS, ...saved};
    }
  }catch(e){}
}
function saveSettings(){
  localStorage.setItem('aether_settings', JSON.stringify(settings));
}
loadSettings();

// ── Utils ─────────────────────────────────────────────
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const today=()=>new Date().toISOString().slice(0,10);
const daysLater=n=>{const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);};
const fmt=n=>Number(n||0).toLocaleString();
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const g=id=>{const el=document.getElementById(id);return el?el.value.trim():'';};
const gn=id=>Number(g(id))||0;

function nextQno(){
  const yr=new Date().getFullYear();
  const ex=quotes.filter(q=>q.qno&&q.qno.startsWith(`QT-${yr}-`));
  let max=0;ex.forEach(q=>{const n=parseInt((q.qno.split('-')[2])||0);if(n>max)max=n;});
  return `QT-${yr}-${String(max+1).padStart(3,'0')}`;
}
function toast(msg,type='info'){
  const t=document.createElement('div');t.className=`toast ${type}`;t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),2800);
}
function setSyncStatus(state){
  const el=document.getElementById('sync-status');if(!el)return;
  const dot=el.querySelector('.sync-dot'),lbl=el.querySelector('span');
  dot.className='sync-dot'+(state==='online'?'':state==='loading'?' loading':' offline');
  lbl.textContent=state==='online'?'已同步':state==='loading'?'連線中':'離線';
}
function calcQ(q){
  const revenue=q.items.reduce((s,i)=>s+(Number(i.price)||0)*(Number(i.qty)||0),0);
  const totalCost=q.items.reduce((s,i)=>s+(Number(i.cost)||0)*(Number(i.qty)||0),0);
  const tax=Math.round(revenue*0.05);
  const profit=revenue-totalCost;
  const margin=revenue>0?Math.round(profit/revenue*100):0;
  return{revenue,totalCost,tax,total:revenue+tax,profit,margin};
}

// ── Firebase Listeners ────────────────────────────────
db.collection('quotes').orderBy('createdAt','desc').onSnapshot(snap=>{
  quotes=snap.docs.map(d=>({id:d.id,...d.data()}));
  renderHistoryList();setSyncStatus('online');
  if(currentView==='quotes'&&currentQuoteId){
    if(!quotes.find(q=>q.id===currentQuoteId)){currentQuoteId=null;renderEmpty();}
  }
  if(currentView==='summary')renderSummary();
},err=>{console.error(err);setSyncStatus('offline');toast('連線失敗','error');});

db.collection('items').orderBy('createdAt','desc').onSnapshot(snap=>{
  libItems=snap.docs.map(d=>({id:d.id,...d.data()}));
  if(currentView==='library')renderLibrary();
},err=>{console.error(err);});

// ── Firestore Ops ─────────────────────────────────────
async function saveQ(q){
  try{await db.collection('quotes').doc(q.id).set(JSON.parse(JSON.stringify(q)));setSyncStatus('online');}
  catch(e){toast('儲存失敗','error');setSyncStatus('offline');}
}
async function deleteQ(id){try{await db.collection('quotes').doc(id).delete();}catch(e){toast('刪除失敗','error');}}
async function saveItem(item){try{await db.collection('items').doc(item.id).set(JSON.parse(JSON.stringify(item)));}catch(e){toast('儲存失敗','error');}}
async function deleteItem(id){try{await db.collection('items').doc(id).delete();}catch(e){toast('刪除失敗','error');}}

// ── Navigation ────────────────────────────────────────
function navigateTo(view){
  currentView=view;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  document.getElementById('nav-'+view)?.classList.add('active');
  if(view==='quotes')renderQuoteView();
  else if(view==='library')renderLibraryView();
  else if(view==='summary')renderSummaryView();
  else if(view==='settings')renderSettingsView();
}

// ── History Sidebar ───────────────────────────────────
function renderHistoryList(){
  const list=document.getElementById('history-list');
  if(!quotes.length){list.innerHTML='<div style="padding:12px;text-align:center;color:var(--muted);font-size:12px">尚無報價單</div>';return;}
  list.innerHTML=quotes.map(q=>`
    <div class="history-item${q.id===currentQuoteId?' active':''}" onclick="selectQuote('${q.id}')">
      <div class="h-qno">${esc(q.qno)}</div>
      <div class="h-name">${esc(q.projectName||'（未命名）')}</div>
      <div class="h-date">${q.date||''}</div>

}

// ── Quote Operations ──────────────────────────────────
function newBlankQuote(){
  return{id:uid(),qno:nextQno(),date:today(),validDate:daysLater(14),projectName:'',projectNote:'',
    salesperson:SALESPERSONS[0],salespersonPhone:'',clientName:'',clientContact:'',clientPhone:'',clientAddress:'',
    items:[{id:uid(),name:'',price:0,cost:0,qty:1,unit:'式',note:''}],
    terms:{...TERMS},createdAt:new Date().toISOString()};
}
function getCurrentQ(){return quotes.find(q=>q.id===currentQuoteId)||null;}
function newQuote(){
  const q=newBlankQuote();quotes.unshift(q);currentQuoteId=q.id;
  saveQ(q);navigateTo('quotes');renderHistoryList();
}
async function saveCurrentQuote(){
  const q=getCurrentQ();if(!q){toast('請先選擇報價單','error');return;}
  collectForm(q);collectTerms(q);await saveQ(q);renderHistoryList();toast('已儲存 ✓','success');
}
async function deleteCurrentQuote(){
  const q=getCurrentQ();if(!q)return;
  if(!confirm(`確定要刪除「${q.qno}」？`))return;
  const id=q.id;currentQuoteId=null;await deleteQ(id);renderEmpty();renderQuoteTopbar();toast('已刪除','info');
}
function selectQuote(id){currentQuoteId=id;currentTab='form';renderHistoryList();navigateTo('quotes');}

// ── Collect Form ──────────────────────────────────────
function collectForm(q){
  if(!document.getElementById('f-qno'))return;
  q.qno=g('f-qno');q.date=g('f-date');q.validDate=g('f-validDate');
  q.salesperson=g('f-salesperson');q.salespersonPhone=g('f-salespersonPhone');
  q.projectName=g('f-projectName');q.projectNote=g('f-projectNote');
  q.clientName=g('f-clientName');q.clientContact=g('f-clientContact');q.clientPhone=g('f-clientPhone');q.clientAddress=g('f-clientAddress');
  q.items=q.items.map((item,i)=>({...item,name:g('i-name-'+i),price:gn('i-price-'+i),cost:gn('i-cost-'+i),qty:gn('i-qty-'+i)||1,unit:g('i-unit-'+i)||'式',note:g('i-note-'+i)}));
}
function collectTerms(q){
  if(!document.getElementById('f-t-confirm'))return;
  q.terms.confirm=g('f-t-confirm');q.terms.payment=g('f-t-payment');q.terms.deadline=g('f-t-deadline');q.terms.warranty=g('f-t-warranty');q.terms.extra=g('f-t-extra');
}

// ── Quote View ────────────────────────────────────────
function renderQuoteView(){if(currentQuoteId){renderCurrentTab();}else{renderEmpty();}renderQuoteTopbar();}
function renderEmpty(){document.getElementById('main-content').innerHTML='<div class="empty-state"><div class="icon">📄</div><p>請選擇或建立報價單</p></div>';}

function switchTab(tab){

  document.getElementById('tab-'+tab)?.classList.add('active');

function renderQuoteTopbar(){

function syncItems(){
  const q=getCurrentQ();if(!q)return;collectForm(q);
  q.items.forEach((item,i)=>{const sub=document.getElementById('i-sub-'+i);if(sub)sub.textContent=`NT$ ${fmt((item.price||0)*(item.qty||1));}`;});
  const{revenue,tax,total}=calcQ(q);
  const ts=document.getElementById('tot-sub'),tt=document.getElementById('tot-tax'),tg=document.getElementById('tot-total');
  if(ts)ts.textContent=`NT$ ${fmt(revenue)}`;if(tt)tt.textContent=`NT$ ${fmt(tax)}`;if(tg)tg.textContent=`NT$ ${fmt(total)}`;
}
function addItem(){const q=getCurrentQ();if(!q)return;collectForm(q);q.items.push({id:uid(),name:'',price:0,cost:0,qty:1,unit:'式',note:''});renderForm();}
function removeItem(i){const q=getCurrentQ();if(!q)return;collectForm(q);if(q.items.length<=1){toast('至少保留一個項目','error');return;}q.items.splice(i,1);renderForm();}
function resetTerms(){['confirm','payment','deadline','warranty','extra'].forEach(k=>{const el=document.getElementById('f-t-'+k);if(el)el.value=TERMS[k];});toast('條款已還原');}

async function downloadPDF(){
  const q=getCurrentQ();if(!q){toast('請先選擇報價單','error');return;}
  collectForm(q);saveQ(q);
  const btn=document.getElementById('btn-pdf');
  if(btn){btn.textContent='⏳ 產生中…';btn.disabled=true;}
  currentTab='preview';renderPreview();
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-preview')?.classList.add('active');
  await new Promise(r=>setTimeout(r,400));
  const element=document.getElementById('pdf-target');
  if(!element){toast('PDF 產生失敗','error');if(btn){btn.textContent='📥 下載 PDF';btn.disabled=false;}return;}
  try{
    const filename=`${q.qno}_${(q.projectName||'報價單').replace(/[\/\\:*?"<>|]/g,'')}.pdf`;
    await html2pdf().set({margin:0,filename,image:{type:'jpeg',quality:0.97},
      html2canvas:{scale:2,useCORS:true,backgroundColor:'#ffffff',logging:false,
        onclone:(doc)=>{const el=doc.getElementById('pdf-target');if(el){el.style.margin='0';el.style.maxWidth='none';el.style.width='800px';el.style.boxShadow='none';el.style.borderRadius='0';}}},
      jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}}).from(element).save();
    toast('PDF 已下載 ✓','success');
  }catch(e){console.error(e);toast('PDF 產生失敗，請改用「列印」','error');}
  finally{if(btn){btn.textContent='📥 下載 PDF';btn.disabled=false;}}
}

function openItemModal(id=null){
  const item=id?libItems.find(i=>i.id===id):null;
  const overlay=document.createElement('div');overlay.className='modal-overlay';overlay.id='item-modal';
  overlay.innerHTML=`<div class="modal"><h3>${item?'編輯品項':'新增品項'}</h3>
    <div class="modal-body"><div class="modal-form">
      <div><label>品項名稱</label><input id="mi-name" value="${esc(item?.name||'')}" placeholder="例：LED 顯示幕租賃"></div>

      </div>
      <div><label>單位</label><input id="mi-unit" value="${esc(item?.unit||'式')}" placeholder="式、場、人/天…"></div>
      <div><label>備註</label><textarea id="mi-note" rows="2">${esc(item?.note||'')}</textarea></div>

function getProfitPreviewHTML(price,cost){
  price=Number(price)||0;cost=Number(cost)||0;const p=price-cost;const r=price>0?Math.round(p/price*100):0;
  return`<div class="pp-item"><span class="pp-label">毛利</span><span class="pp-val ${p>=0?'green':''}">${p>=0?'+':''}NT$ ${fmt(p)}</span></div><div class="pp-item"><span class="pp-label">毛利率</span><span class="pp-val ${r>=30?'green':''}">${r}%</span></div>`;
}
function updateProfitPreview(){const pp=document.getElementById('profit-preview');if(pp)pp.innerHTML=getProfitPreviewHTML(g('mi-price'),g('mi-cost'));}
async function submitItemModal(existingId){
  const name=g('mi-name');if(!name){toast('請輸入品項名稱','error');return;}
  const item={id:existingId||uid(),name,price:Number(g('mi-price'))||0,cost:Number(g('mi-cost'))||0,unit:g('mi-unit')||'式',note:g('mi-note'),createdAt:existingId?(libItems.find(i=>i.id===existingId)?.createdAt||new Date().toISOString()):new Date().toISOString()};
  await saveItem(item);document.getElementById('item-modal')?.remove();toast('已儲存','success');
}
async function confirmDeleteItem(id){
  const item=libItems.find(i=>i.id===id);if(!item)return;
  if(!confirm(`確定刪除「${item.name}」？`))return;
  await deleteItem(id);toast('已刪除','info');
}

function renderSummary(){
  if(currentView!=='summary')return;
  const c=document.getElementById('main-content');

  const totalCost=quotes.reduce((s,q)=>s+calcQ(q).totalCost,0);
  const totalProfit=quotes.reduce((s,q)=>s+calcQ(q).profit,0);
  const baseRev=quotes.reduce((s,q)=>s+calcQ(q).revenue,0);
  const avgMargin=baseRev>0?Math.round(totalProfit/baseRev*100):0;
  const mc=avgMargin>=50?'green':avgMargin>=30?'gold':'red';
  const rows=quotes.map(q=>{const{total,totalCost,profit,margin}=calcQ(q);return`<tr onclick="goToQuote('${q.id}')">
    <td><strong style="color:var(--accent2)">${esc(q.qno)}</strong></td>
    <td><div>${esc(q.projectName||'（未命名）')}</div><div style="font-size:11px;color:var(--muted)">${esc(q.clientName||'—')}</div></td>
    <td>${q.date||''}</td><td>${esc(q.salesperson||'')}</td>
    <td class="r"><strong>NT$ ${fmt(total)}</strong></td><td class="r">NT$ ${fmt(totalCost)}</td>
    <td class="r" style="color:${profit>=0?'var(--success)':'var(--danger)'}">NT$ ${fmt(profit)}</td>
    <td class="r"><span class="margin-badge ${margin>=30?'good':'warn'}">${margin}%</span></td>
  </tr>`;}).join('');
  c.innerHTML=`
    <div class="summary-stats">
      <div class="stat-card"><div class="s-label">總報價金額（含稅）</div><div class="s-val gold">NT$ ${fmt(totalRevenue)}</div></div>
      <div class="stat-card"><div class="s-label">總成本</div><div class="s-val">NT$ ${fmt(totalCost)}</div></div>
      <div class="stat-card"><div class="s-label">累計毛利</div><div class="s-val ${totalProfit>=0?'green':'red'}">${totalProfit>=0?'+':''}NT$ ${fmt(totalProfit)}</div></div>
      <div class="stat-card"><div class="s-label">平均毛利率</div><div class="s-val ${mc}" style="font-size:24px">${avgMargin}%</div></div>
    </div>
    <div class="summary-table-wrap">
      <h3>📋 歷史報價單匯總 <span class="badge-count">${quotes.length} 份</span></h3>
      <table class="summary-table"><thead><tr>
        <th>報價單號</th><th>專案 / 客戶</th><th>日期</th><th>業務</th>
        <th class="r">含稅金額</th><th class="r">總成本</th><th class="r">毛利</th><th class="r">毛利率</th>
      </tr></thead><tbody>${rows||`<tr><td colspan="8" style="text-align:center;color:var(--muted);padding:24px">尚無報價單</td></tr>`}</tbody></table>
      <div style="padding:12px 16px;font-size:11px;color:var(--muted)">點擊任一列可切換至該報價單進行編輯。</div>
    </div>`;
}

// ── Settings View ─────────────────────────────────────
function renderSettingsView(){
  document.getElementById('topbar').innerHTML=`<span class="topbar-title">平台設定</span><div id="sync-status" class="sync-badge"><div class="sync-dot"></div><span>已同步</span></div>`;
  const isDefaultLogo=settings.logo===DEFAULT_SETTINGS.logo;
  const isDefaultStamp=settings.stamp===DEFAULT_SETTINGS.stamp;
  const logoPrev=settings.logo?`<img src="${settings.logo}">`:`<span class="empty-hint">無圖片</span>`;
  const stampPrev=settings.stamp?`<img src="${settings.stamp}">`:`<span class="empty-hint">無圖片</span>`;
  const logoTag=isDefaultLogo?`<span style="font-size:10px;color:var(--success);background:rgba(90,171,143,.15);padding:2px 7px;border-radius:10px">✓ 使用預設圖片</span>`:`<span style="font-size:10px;color:var(--accent2);background:rgba(204,179,140,.15);padding:2px 7px;border-radius:10px">已自訂上傳</span>`;
  const stampTag=isDefaultStamp?`<span style="font-size:10px;color:var(--success);background:rgba(90,171,143,.15);padding:2px 7px;border-radius:10px">✓ 使用預設圖片</span>`:`<span style="font-size:10px;color:var(--accent2);background:rgba(204,179,140,.15);padding:2px 7px;border-radius:10px">已自訂上傳</span>`;
  document.getElementById('main-content').innerHTML=`
    <div class="section-card" style="max-width:700px">
      <div class="section-card-title">🖼 報價單圖片設定</div>
      <p style="font-size:12px;color:var(--muted);margin-bottom:20px;line-height:1.6">LOGO 和印章已預設載入，所有人開啟平台都會自動顯示。若需要替換圖片，可在此上傳自訂版本（儲存於此瀏覽器）。</p>
      <div class="settings-grid">
        <div class="img-upload-card">
          <h3>公司 LOGO ${logoTag}</h3>
          <p>顯示於報價單左上角，建議使用白底或透明底的 PNG 圖片。</p>
          <div class="img-preview-box" id="logo-preview-box" style="background:#3a3a3a;min-height:80px">${logoPrev}</div>
          <div class="upload-btn-wrap">
            <button class="btn btn-ghost btn-sm btn-full">📁 選擇 LOGO 圖片</button>
            <input type="file" accept="image/*" onchange="handleImgUpload(event,'logo')">
          </div>
          ${!isDefaultLogo?`<button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="clearImg('logo')">↩ 還原預設</button>`:''}
        </div>
        <div class="img-upload-card">
          <h3>發票章 / 公司印章 ${stampTag}</h3>
          <p>顯示於報價單左下角匯款帳戶旁，建議使用透明底的 PNG 圖片。</p>
          <div class="img-preview-box" id="stamp-preview-box">${stampPrev}</div>
          <div class="upload-btn-wrap">
            <button class="btn btn-ghost btn-sm btn-full">📁 選擇印章圖片</button>
            <input type="file" accept="image/*" onchange="handleImgUpload(event,'stamp')">
          </div>
          ${!isDefaultStamp?`<button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="clearImg('stamp')">↩ 還原預設</button>`:''}
        </div>
      </div>
    </div>`;
}
function handleImgUpload(event, key){
  const file=event.target.files[0];if(!file)return;
  if(file.size>2*1024*1024){toast('圖片不能超過 2MB','error');return;}
  const reader=new FileReader();
  reader.onload=e=>{
    settings[key]=e.target.result;
    saveSettings();
    renderSettingsView();
    toast(`${key==='logo'?'LOGO':'印章'}已上傳 ✓`,'success');
  };
  reader.readAsDataURL(file);
}
function clearImg(key){
  settings[key]=DEFAULT_SETTINGS[key]; // 還原為預設路徑，非 null
  saveSettings();
  renderSettingsView();
  toast('已還原為預設圖片','info');
}
</script>
</body>
</html>
